<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Convenio LPV - Editor</title>

  <style>
/* ESTILO MODERNO Y PROFESIONAL */

body {
  font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Arial;
  margin: 0;
  padding: 20px;
  background: #fff5f5;
  color: #222;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

h1 {
  margin: 0;
  font-size: 22px;
  color: #c40000;
  font-weight: 700;
}

.role-badge {
  padding: 6px 12px;
  background: #eee;
  border-radius: 8px;
  font-size: 14px;
}

.logout-btn {
  background: #444;
  padding: 6px 10px;
  border-radius: 6px;
  color: #fff;
  border: none;
  cursor: pointer;
}

.shield {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: #fff;
  border: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(0,0,0,.08);
  transition: 0.15s;
}

.shield:hover {
  transform: translateY(-2px);
}

.admin-panel {
  display: none;
  position: absolute;
  right: 0;
  top: 50px;
  background: #fff;
  padding: 14px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,.15);
  min-width: 240px;
  z-index: 999;
  flex-direction: column;
  gap: 10px;
}

label {
  font-weight: 600;
  margin-top: 12px;
}

textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 15px;
  background: #fff;
}

button {
  background: #c40000;
  color: #fff;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.15s;
}

button:hover {
  background: #a00000;
}

button.secondary {
  background: #666;
}

.images-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 12px;
}

.img-wrap {
  position: relative;
  border: 1px solid #eee;
  padding: 6px;
  border-radius: 8px;
  background: #fafafa;
}

.img-wrap img {
  width: 100%;
  height: 80px;
  object-fit: cover;
  border-radius: 6px;
}

.img-remove {
  position: absolute;
  top: 6px;
  right: 6px;
  background: #0008;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 2px 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<header style="position:relative;">
  <div style="display:flex; align-items:center; gap:10px;">
    <div style="font-size:28px">📚</div>
    <h1>Convenio LPV</h1>
  </div>

  <div style="display:flex; align-items:center; gap:10px;">
    <div class="role-badge">Rol: <span id="roleText">usuario</span></div>
    <button id="logoutBtn" class="logout-btn" style="display:none">Salir Admin</button>

    <div style="position:relative;">
      <div class="shield" id="shieldBtn">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M12 2L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-3z" fill="#c40000"/>
          <circle cx="12" cy="12" r="3.5" fill="#fff"/>
        </svg>
      </div>

      <div id="adminPanel" class="admin-panel">
        <strong style="color:#c40000;">Acceso Admin</strong>
        <input id="adminCode" type="password" placeholder="Introduce código">
        <button id="adminEnter">Entrar</button>
        <button id="adminCancel" class="secondary">Cerrar</button>
      </div>
    </div>
  </div>
</header>

<main id="appRoot"></main>

<script src="config.js"></script>
<script src="respuestas.js"></script>

<script>
(function(){

  const $ = s => document.querySelector(s);

  let estado = {
    nombre: "",
    selur: "",
    jornada: "",
    tipo: "",        // convenio o selur
    categoria: "",
    sub: "",
    role: sessionStorage.getItem("role") || "user"
  };

  /* -------------------------
     ACCESO ADMIN
  ------------------------- */
  const shieldBtn = $("#shieldBtn");
  const adminPanel = $("#adminPanel");
  const adminCode = $("#adminCode");
  const adminEnter = $("#adminEnter");
  const adminCancel = $("#adminCancel");
  const roleText = $("#roleText");
  const logoutBtn = $("#logoutBtn");

  function setRoleUI(){
    roleText.textContent = estado.role === "admin" ? "admin" : "usuario";
    logoutBtn.style.display = estado.role === "admin" ? "inline-block" : "none";
  }

  shieldBtn.addEventListener("click", ()=>{
    adminPanel.style.display = adminPanel.style.display === "flex" ? "none" : "flex";
    adminPanel.style.flexDirection = "column";
    adminCode.focus();
  });

  adminCancel.addEventListener("click", ()=>{
    adminPanel.style.display = "none";
  });

  adminEnter.addEventListener("click", ()=>{
    if(adminCode.value === "Selur2212@"){
      estado.role = "admin";
      sessionStorage.setItem("role","admin");
      adminPanel.style.display = "none";
      adminCode.value = "";
      setRoleUI();
      renderApp();
      alert("Acceso admin concedido");
    } else {
      alert("Código incorrecto");
    }
  });

  logoutBtn.addEventListener("click", ()=>{
    estado.role = "user";
    sessionStorage.setItem("role","user");
    setRoleUI();
    renderApp();
  });

  /* -------------------------
     RENDER PRINCIPAL
  ------------------------- */
  function renderApp(){
    const root = $("#appRoot");
    root.innerHTML = "";

    /* 1) FORMULARIO INICIAL */
    if (!estado.nombre || !estado.selur || !estado.jornada) {
      root.innerHTML = `
        <h2 style="color:#c40000;">Datos iniciales</h2>

        <label>Nombre</label>
        <input id="inpNombre" type="text" style="padding:8px; width:100%;">

        <label>Selur</label>
        <select id="inpSelur" style="padding:8px; width:100%;">
          <option value="">-- Selecciona --</option>
          <option value="pintadas">Pintadas</option>
          <option value="basico">Básico</option>
        </select>

        <label>Jornada</label>
        <select id="inpJornada" style="padding:8px; width:100%;">
          <option value="">-- Selecciona --</option>
          <option value="diario">Diario</option>
          <option value="cuadrante">Por cuadrante</option>
          <option value="sdf">SDF</option>
        </select>

        <button id="btnContinuar" style="margin-top:15px; width:100%;">Continuar</button>
      `;

      $("#btnContinuar").addEventListener("click", () => {
        estado.nombre = $("#inpNombre").value.trim();
        estado.selur = $("#inpSelur").value;
        estado.jornada = $("#inpJornada").value;

        if (!estado.nombre || !estado.selur || !estado.jornada) {
          alert("Completa todos los campos");
          return;
        }

        renderApp();
      });

      return;
    }

    /* 2) ELEGIR ENTRE CONVENIO O ACUERDO SELUR */
    if (!estado.tipo) {
      root.innerHTML = `
        <h2 style="color:#c40000;">Selecciona una opción</h2>

        <div style="display:flex; gap:20px; margin-top:20px;">
          <button id="btnConvenio" style="flex:1; padding:20px; font-size:18px;">Convenio</button>
          <button id="btnSelur" style="flex:1; padding:20px; font-size:18px;">Acuerdo Selur</button>
        </div>
      `;

      $("#btnConvenio").addEventListener("click", () => {
        estado.tipo = "convenio";
        renderApp();
      });

      $("#btnSelur").addEventListener("click", () => {
        estado.tipo = "selur";
        alert("Aún no has pasado las categorías de Acuerdo Selur");
      });

      return;
    }

    /* 3) MOSTRAR CATEGORÍAS (CONVENIO) */
    if (estado.tipo === "convenio" && !estado.categoria) {
      const titulo = document.createElement("h2");
      titulo.textContent = "¿Qué quieres consultar?";
      titulo.style.color = "#c40000";
      root.appendChild(titulo);

      const grid = document.createElement("div");
      grid.style.display = "grid";
      grid.style.gridTemplateColumns = "repeat(auto-fill, minmax(140px, 1fr))";
      grid.style.gap = "12px";
      grid.style.marginTop = "10px";

      Object.keys(window.ESTRUCTURA).forEach(cat => {
        const c = window.ESTRUCTURA[cat];

        const card = document.createElement("div");
        card.style.background = "#fff";
        card.style.border = "1px solid #eee";
        card.style.borderRadius = "10px";
        card.style.padding = "18px";
        card.style.cursor = "pointer";
        card.style.textAlign = "center";
        card.style.boxShadow = "0 4px 10px rgba(0,0,0,.05)";

        card.innerHTML = `
          <div style="font-size:32px;">${c.icono}</div>
          <div style="margin-top:8px; font-weight:600;">${c.titulo}</div>
        `;

        card.addEventListener("click", () => {
          estado.categoria = cat;
          renderSubcategorias();
        });

        grid.appendChild(card);
      });

      root.appendChild(grid);
      return;
    }

    /* 4) SI YA HAY SUB → MOSTRAR CONTENIDO */
    if (estado.sub) {
      renderContenido();
      return;
    }

    /* 5) SI NO HAY SUB → MOSTRAR SUBCATEGORÍAS */
    renderSubcategorias();
  }

  /* -------------------------
     SUBCATEGORÍAS
  ------------------------- */
  function renderSubcategorias() {
    const root = $("#appRoot");
    root.innerHTML = "";

    const cat = window.ESTRUCTURA[estado.categoria];

    const titulo = document.createElement("h2");
    titulo.textContent = cat.titulo;
    titulo.style.color = "#c40000";
    root.appendChild(titulo);

    const grid = document.createElement("div");
    grid.style.display = "grid";
    grid.style.gridTemplateColumns = "repeat(auto-fill, minmax(160px, 1fr))";
    grid.style.gap = "12px";
    grid.style.marginTop = "10px";

    Object.keys(cat.sub).forEach(sub => {
      const s = cat.sub[sub];

      const card = document.createElement("div");
      card.style.background = "#fff";
      card.style.border = "1px solid #eee";
      card.style.borderRadius = "10px";
      card.style.padding = "14px";
      card.style.cursor = "pointer";
      card.style.textAlign = "center";
      card.style.boxShadow = "0 4px 10px rgba(0,0,0,.05)";

      card.textContent = s.titulo;

      card.addEventListener("click", () => {
        estado.sub = sub;
        renderContenido();
      });

      grid.appendChild(card);
    });

    root.appendChild(grid);
  }

  /* -------------------------
     CONTENIDO / EDITOR
  ------------------------- */
  function renderContenido() {
    const root = $("#appRoot");
    root.innerHTML = "";

    const nodoCat = window.RESPUESTAS[estado.categoria];
    const nodo = nodoCat ? nodoCat[estado.sub] : null;

    const titulo = document.createElement("h2");
    titulo.textContent = window.ESTRUCTURA[estado.categoria].sub[estado.sub].titulo;
    titulo.style.color = "#c40000";
    root.appendChild(titulo);

    if (!nodo) {
      root.innerHTML += "<p>No hay contenido definido todavía.</p>";
      return;
    }

    /* MODO USUARIO → SOLO LECTURA */
    if (estado.role !== "admin") {
      const view = document.createElement("div");
      view.style.background = "#fff";
      view.style.border = "1px solid #eee";
      view.style.borderRadius = "10px";
      view.style.padding = "14px";
      view.style.marginTop = "10px";

      if (nodo.diario) view.innerHTML += `<p>${nodo.diario}</p>`;
      if (nodo.sdf) view.innerHTML += `<p>${nodo.sdf}</p>`;

      root.appendChild(view);
      return;
    }

    /* MODO ADMIN → EDITOR */
    const editor = document.createElement("div");
    editor.style.marginTop = "20px";

    const lblDiario = document.createElement("label");
    lblDiario.textContent = "Diario (editar)";
    const taDiario = document.createElement("textarea");
    taDiario.value = nodo.diario || "";
    lblDiario.appendChild(taDiario);

    const lblSdf = document.createElement("label");
    lblSdf.textContent = "SDF (editar)";
    const taSdf = document.createElement("textarea");
    taSdf.value = nodo.sdf || "";
    lblSdf.appendChild(taSdf);

    editor.appendChild(lblDiario);
    editor.appendChild(lblSdf);

    const btns = document.createElement("div");
    btns.style.marginTop = "10px";
    btns.style.display = "flex";
    btns.style.gap = "8px";

    const btnGuardar = document.createElement("button");
    btnGuardar.textContent = "Guardar";

    const btnGuardarTodo = document.createElement("button");
    btnGuardarTodo.textContent = "Guardar TODO";
    btnGuardarTodo.className = "secondary";

    btns.appendChild(btnGuardar);
    btns.appendChild(btnGuardarTodo);
    editor.appendChild(btns);

    root.appendChild(editor);

    btnGuardar.addEventListener("click", ()=>{
      nodo.diario = taDiario.value;
      nodo.sdf = taSdf.value;
      alert("Guardado en memoria");
    });

    btnGuardarTodo.addEventListener("click", ()=>{
      localStorage.setItem("RESPUESTAS", JSON.stringify(window.RESPUESTAS));
      alert("Guardado TODO");
    });
  }

  setRoleUI();
  renderApp();

})();
</script>

</body>
</html>
