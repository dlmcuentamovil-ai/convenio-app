<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta Convenio Selur</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Archivos externos -->
  <script src="estructura.js"></script>
  <script src="respuestas.js"></script>
</head>

<body>
  <header>
    <div id="roleText">usuario</div>
    <button id="shieldBtn">🛡️</button>
    <button id="logoutBtn" style="display:none;">Salir</button>
  </header>

  <!-- Panel admin -->
  <div id="adminPanel" class="modal">
    <div class="modal-content">
      <h3>Acceso administrador</h3>
      <input id="adminCode" type="password" placeholder="Código" />
      <div class="modal-buttons">
        <button id="adminEnter">Entrar</button>
        <button id="adminCancel">Cancelar</button>
      </div>
    </div>
  </div>

  <main id="appRoot"></main>
<script>
(() => {

  /* CARGAR RESPUESTAS DESDE LOCALSTORAGE */
  const savedResp = localStorage.getItem("RESPUESTAS");
  if (savedResp) {
    try { window.RESPUESTAS = JSON.parse(savedResp); }
    catch(e){ console.error("Error cargando RESPUESTAS", e); }
  }

  /* VARIABLES GLOBALES */
  const $ = sel => document.querySelector(sel);

  const estado = {
    role: "usuario",
    nombre: "",
    selur: "",
    jornada: "",
    tipo: "",
    categoria: "",
    sub: ""
  };

  /* NORMALIZAR JORNADA */
  function normalizarJornada(j) {
    if (j === "sdf") return "sdf";
    return "diario";
  }

  /* ADMIN */
  const shieldBtn = $("#shieldBtn");
  const adminPanel = $("#adminPanel");
  const adminEnter = $("#adminEnter");
  const adminCancel = $("#adminCancel");
  const adminCode = $("#adminCode");
  const logoutBtn = $("#logoutBtn");
  const roleText = $("#roleText");

  shieldBtn.addEventListener("click", () => adminPanel.style.display = "flex");
  adminCancel.addEventListener("click", () => adminPanel.style.display = "none");

  adminEnter.addEventListener("click", () => {
    if (adminCode.value.trim() === "Selur2212@") {
      estado.role = "admin";
      estado.tipo = "";
      estado.categoria = "";
      estado.sub = "";
      adminPanel.style.display = "none";
      adminCode.value = "";
      setRoleUI();
      renderApp();
    } else alert("Código incorrecto");
  });

  logoutBtn.addEventListener("click", () => {
    estado.role = "usuario";
    estado.tipo = "";
    estado.categoria = "";
    estado.sub = "";
    setRoleUI();
    renderApp();
  });

  function setRoleUI() {
    roleText.textContent = estado.role;
    logoutBtn.style.display = estado.role === "admin" ? "inline-block" : "none";
  }
/* FUNCIÓN PRINCIPAL */
  function renderApp() {
    const root = $("#appRoot");
    root.innerHTML = "";

    /* ADMIN SIN TIPO */
    if (estado.role === "admin" && !estado.tipo) {
      root.innerHTML = `
        <h2 style="color:#c40000;">Selecciona una opción</h2>
        <div style="display:flex; gap:20px; margin-top:20px;">
          <button id="btnConvenio" style="flex:1; padding:20px;">Convenio</button>
          <button id="btnSelur" style="flex:1; padding:20px;">Acuerdo Selur</button>
        </div>
      `;

      $("#btnConvenio").addEventListener("click", () => {
        estado.tipo = "convenio";
        renderApp();
      });

      $("#btnSelur").addEventListener("click", () => alert("Aún no has pasado las categorías de Acuerdo Selur"));
      return;
    }

    /* FORMULARIO USUARIO */
    if (estado.role !== "admin" && (!estado.nombre || !estado.selur || !estado.jornada)) {
      root.innerHTML = `
        <h2 style="color:#c40000;">Datos del trabajador</h2>

        <label>Nombre</label>
        <input id="inpNombre" type="text">

        <label>¿Eres del Selur básico o pintadas?</label>
        <select id="inpSelur">
          <option value="">Selecciona...</option>
          <option value="basico">Básico</option>
          <option value="pintadas">Pintadas</option>
        </select>

        <label>Jornada</label>
        <select id="inpJornada">
  <option value="">Selecciona...</option>
</select>

        <button id="btnForm">Entrar</button>
      `;

      $("#inpSelur").addEventListener("change", () => {
        const j = $("#inpJornada");
        j.innerHTML = "";

        if ($("#inpSelur").value === "basico") {
          j.innerHTML = `
            <option value="">Selecciona...</option>
            <option value="diario">Diario</option>
          `;
        }

        if ($("#inpSelur").value === "pintadas") {
          j.innerHTML = `
            <option value="">Selecciona...</option>
            <option value="diario">Diario</option>
            <option value="sdf">SDF</option>
          `;
        }
      });

      $("#btnForm").addEventListener("click", () => {
        estado.nombre = $("#inpNombre").value.trim();
        estado.selur = $("#inpSelur").value;
        estado.jornada = $("#inpJornada").value;

        if (!estado.nombre || !estado.selur || !estado.jornada) {
          alert("Completa todos los campos");
          return;
        }

        renderApp();
      });

      return;
    }

    /* SELECCIÓN CONVENIO / SELUR */
    if (!estado.tipo) {
      root.innerHTML = `
        <h2 style="color:#c40000;">Selecciona una opción</h2>
        <div style="display:flex; gap:20px; margin-top:20px;">
          <button id="btnConvenio" style="flex:1; padding:20px;">Convenio</button>
          <button id="btnSelur" style="flex:1; padding:20px;">Acuerdo Selur</button>
        </div>
      `;

      $("#btnConvenio").addEventListener("click", () => {
        estado.tipo = "convenio";
        renderApp();
      });

      $("#btnSelur").addEventListener("click", () => alert("Aún no has pasado las categorías de Acuerdo Selur"));
      return;
    }

    /* CATEGORÍAS */
    if (estado.tipo === "convenio" && !estado.categoria) {
      const titulo = document.createElement("h2");
      titulo.textContent = "¿Qué quieres consultar?";
      titulo.style.color = "#c40000";
      root.appendChild(titulo);

      const grid = document.createElement("div");
      grid.style.display = "grid";
      grid.style.gridTemplateColumns = "repeat(2, 1fr)";
      grid.style.gap = "12px";

      Object.keys(window.ESTRUCTURA).forEach(cat => {
        const c = window.ESTRUCTURA[cat];

        const card = document.createElement("div");
        card.style.padding = "20px";
        card.style.background = "#fff";
        card.style.borderRadius = "10px";
        card.style.cursor = "pointer";
        card.style.textAlign = "center";

        card.innerHTML = `
          <div style="font-size:32px;">${c.icono}</div>
          <div>${c.titulo}</div>
        `;

        card.addEventListener("click", () => {
          estado.categoria = cat;
          renderSubcategorias();
        });

        grid.appendChild(card);
      });

      root.appendChild(grid);
      return;
    }

    /* CONTROL FINAL */
    if (estado.categoria && !estado.sub) return renderSubcategorias();
    if (estado.categoria && estado.sub) return renderContenido();
  }

  /* SUBCATEGORÍAS */
  function renderSubcategorias() {
    const root = $("#appRoot");
    root.innerHTML = "";

    const cat = window.ESTRUCTURA[estado.categoria];

    const titulo = document.createElement("h2");
    titulo.textContent = cat.titulo;
    titulo.style.color = "#c40000";
    root.appendChild(titulo);

    const btnBack = document.createElement("button");
    btnBack.textContent = "← Volver";
    btnBack.style.marginBottom = "15px";
    btnBack.addEventListener("click", () => {
      estado.sub = "";
      estado.categoria = "";
      renderApp();
    });
    root.appendChild(btnBack);

    if (window.RESPUESTAS[estado.categoria].imagenes.length > 0 && estado.role !== "admin") {
      const grid = document.createElement("div");
      grid.className = "images-grid";

      window.RESPUESTAS[estado.categoria].imagenes.forEach(img => {
        const wrap = document.createElement("div");
        wrap.className = "img-wrap";

        const image = document.createElement("img");
        image.src = img;

        wrap.appendChild(image);
        grid.appendChild(wrap);
      });

      root.appendChild(grid);
    }

    if (estado.role === "admin") {
      const btnImgs = document.createElement("button");
      btnImgs.textContent = "🖼️ Imágenes de la categoría";
      btnImgs.style.marginBottom = "15px";
      btnImgs.addEventListener("click", () => renderImagenesCategoria());
      root.appendChild(btnImgs);
    }

    const grid = document.createElement("div");
    grid.style.display = "grid";
    grid.style.gridTemplateColumns = "repeat(2, 1fr)";
    grid.style.gap = "12px";

    Object.keys(cat.sub).forEach(sub => {
      const s = cat.sub[sub];

      const card = document.createElement("div");
      card.style.padding = "20px";
      card.style.background = "#fff";
      card.style.borderRadius = "10px";
      card.style.cursor = "pointer";
      card.style.textAlign = "center";

      card.textContent = s.titulo;

      card.addEventListener("click", () => {
        estado.sub = sub;
        renderContenido();
      });

      grid.appendChild(card);
    });

    root.appendChild(grid);
  }

  /* CONTENIDO */
  function renderContenido() {
    const root = $("#appRoot");
    root.innerHTML = "";

    const titulo = document.createElement("h2");
    titulo.textContent = window.ESTRUCTURA[estado.categoria].sub[estado.sub].titulo;
    titulo.style.color = "#c40000";
    root.appendChild(titulo);

    const btnBack = document.createElement("button");
    btnBack.textContent = "← Volver";
    btnBack.style.marginBottom = "15px";
    btnBack.addEventListener("click", () => {
      estado.sub = "";
      renderSubcategorias();
    });
    root.appendChild(btnBack);

    const nodo = window.RESPUESTAS[estado.categoria][estado.sub];

    if (estado.role === "admin") {
  const cont = document.createElement("div");
  cont.style.marginTop = "10px"; // mantiene tu diseño

  cont.innerHTML = `
    <label>Texto Diario</label>
    <textarea id="txtDiario" rows="6">${nodo.diario}</textarea>

    <label>Texto SDF</label>
    <textarea id="txtSdf" rows="6">${nodo.sdf}</textarea>

    <button id="btnSave" style="margin-top:20px;">Guardar</button>
  `;

  root.appendChild(cont);

  // Seleccionar elementos SIN romper el DOM
  const btnSave = cont.querySelector("#btnSave");
  const txtDiario = cont.querySelector("#txtDiario");
  const txtSdf = cont.querySelector("#txtSdf");

  // Guardar correctamente
  btnSave.addEventListener("click", () => {
    nodo.diario = txtDiario.value;
    nodo.sdf = txtSdf.value;

    localStorage.setItem("RESPUESTAS", JSON.stringify(window.RESPUESTAS));
    alert("Guardado");
  });
}

  /* EDITOR IMÁGENES */
  function renderImagenesCategoria() {
    const root = $("#appRoot");
    root.innerHTML = "";

    const cat = estado.categoria;
    const nodo = window.RESPUESTAS[cat];

    const titulo = document.createElement("h2");
    titulo.textContent = "Imágenes de " + window.ESTRUCTURA[cat].titulo;
    titulo.style.color = "#c40000";
    root.appendChild(titulo);

    const btnBack = document.createElement("button");
    btnBack.textContent = "← Volver";
    btnBack.style.marginBottom = "15px";
    btnBack.addEventListener("click", () => renderSubcategorias());
    root.appendChild(btnBack);

    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.multiple = true;
    input.style.marginBottom = "15px";
    root.appendChild(input);

    input.addEventListener("change", e => {
      [...e.target.files].forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          nodo.imagenes.push(ev.target.result);
          renderImagenesCategoria();
        };
        reader.readAsDataURL(file);
      });
    });

    const grid = document.createElement("div");
    grid.className = "images-grid";

    nodo.imagenes.forEach((img, i) => {
      const wrap = document.createElement("div");
      wrap.className = "img-wrap";

      const image = document.createElement("img");
      image.src = img;

      const del = document.createElement("button");
      del.className = "img-remove";
      del.textContent = "X";
      del.addEventListener("click", () => {
        nodo.imagenes.splice(i, 1);
        renderImagenesCategoria();
      });

      wrap.appendChild(image);
      wrap.appendChild(del);
      grid.appendChild(wrap);
    });

    root.appendChild(grid);

    const btnSave = document.createElement("button");
    btnSave.textContent = "Guardar TODO";
    btnSave.style.marginTop = "20px";
    btnSave.addEventListener("click", () => {
      localStorage.setItem("RESPUESTAS", JSON.stringify(window.RESPUESTAS));
      alert("Guardado");
    });

    root.appendChild(btnSave);
  }

  /* BUSCADOR */
  function renderResultadosBusqueda(q) {
    const root = $("#appRoot");
    root.innerHTML = "";

    const titulo = document.createElement("h2");
    titulo.textContent = "Resultados de búsqueda";
    titulo.style.color = "#c40000";
    root.appendChild(titulo);

    const btnBack = document.createElement("button");
    btnBack.textContent = "← Volver";
    btnBack.style.marginBottom = "15px";
    btnBack.addEventListener("click", () => {
      estado.categoria = "";
      estado.sub = "";
      renderApp();
    });
    root.appendChild(btnBack);

    const lista = document.createElement("div");
    lista.style.display = "flex";
    lista.style.flexDirection = "column";
    lista.style.gap = "10px";

    Object.keys(window.RESPUESTAS).forEach(cat => {
      Object.keys(window.RESPUESTAS[cat]).forEach(sub => {
        if (sub === "imagenes") return;

        const nodo = window.RESPUESTAS[cat][sub];
        const texto = (nodo.diario + " " + nodo.sdf).toLowerCase();

        if (texto.includes(q)) {
          const item = document.createElement("div");
          item.style.padding = "10px";
          item.style.border = "1px solid #ddd";
          item.style.borderRadius = "8px";
          item.style.cursor = "pointer";
          item.style.background = "#fff";

          item.textContent =
            window.ESTRUCTURA[cat].titulo +
            " → " +
            window.ESTRUCTURA[cat].sub[sub].titulo;

          item.addEventListener("click", () => {
            estado.categoria = cat;
            estado.sub = sub;
            renderContenido();
          });

          lista.appendChild(item);
        }
      });
    });

    if (lista.children.length === 0) {
      lista.innerHTML = "<p>No se encontraron resultados.</p>";
    }

    root.appendChild(lista);
  }
 /* INICIALIZACIÓN */
  setRoleUI();
  renderApp();

})();
</script>

</body>
</html>
