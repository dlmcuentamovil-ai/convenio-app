<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convenio Colectivo LPV Madrid 2026-31</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .chat-message { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .thinking-dots { animation: thinking 1.4s infinite; }
        @keyframes thinking { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
    </style>
</head>
<body class="bg-white">
    <div id="app"></div>

    <script>
        // ============================================
        // BASE DE CONOCIMIENTO ESTRUCTURADA
        // ============================================
        const CONOCIMIENTO = {
            VACACIONES: "30 días naturales al año. No acumulables entre años. Se disfrutan según calendario empresa.",
            
            PERMISOS_RETRIBUIDOS: {
                matrimonio: "3 días hábiles. Se pagan.",
                nacimiento: "3 días hábiles. Se pagan.",
                defuncion_conyugue: "3 días hábiles (cónyuge/pareja registrada). Se pagan.",
                defuncion_padres: "2 días hábiles (padres/suegros). Se pagan.",
                defuncion_hermanos: "1 día hábil (hermanos). Se pagan.",
                defuncion_otros: "1 día hábil (tíos/sobrinos). 2 días si fuera de provincia. Se pagan.",
                medico: "Tiempo indispensable (urgencia médica). Se paga.",
                carnet: "Horas necesarias (carnet/DNI). Se pagan.",
                asuntos_propios: "1 día/año. Se paga.",
            },

            PERMISOS_NO_RETRIBUIDOS: "Hasta 30 días/año por motivos familiares, sociales, estudio, etc. NO se pagan.",

            BAJAS_MEDICAS: "Primeros 3 días: empresa paga 60%. Desde día 4: mutua paga 75%.",

            SALARIO_DIARIO: {
                peon: "1.250€/mes",
                oficial: "1.380€/mes",
                capataz: "1.520€/mes"
            },

            SALARIO_SDF: {
                peon: "950€/mes",
                oficial: "1.050€/mes",
                capataz: "1.160€/mes"
            },

            PLUS: {
                nocturno: "+25%",
                dominical: "+50%",
                festivo: "+100%",
                antiguedad: "+2% cada 5 años (máx 20%)"
            },

            HORARIOS_DIARIO: {
                manana: "06:00 - 14:30",
                tarde: "14:30 - 23:00",
                noche: "23:00 - 06:00"
            },

            HORARIOS_SDF: {
                manana: "06:00 - 14:30",
                tarde: "14:30 - 23:00",
                noche: "23:00 - 06:00",
                nota: "Turnos rotativos. Máx 30h/semana. Mín 25 días/mes."
            }
        };

        // ============================================
        // BÚSQUEDA Y RESPUESTA
        // ============================================
        function normalizarTexto(texto) {
            return texto.toLowerCase()
                .replace(/[áàäâ]/g, 'a')
                .replace(/[éèëê]/g, 'e')
                .replace(/[íìïî]/g, 'i')
                .replace(/[óòöô]/g, 'o')
                .replace(/[úùüû]/g, 'u')
                .replace(/[ñ]/g, 'n')
                .trim();
        }

        function generarRespuesta(pregunta, jornada) {
            const p = normalizarTexto(pregunta);

            // VACACIONES
            if (p.includes('vacacion')) {
                return `✅ ${CONOCIMIENTO.VACACIONES}`;
            }

            // PERMISOS NO RETRIBUIDOS
            if (p.includes('no retribuido') || (p.includes('30 dias') && p.includes('permiso'))) {
                return `✅ ${CONOCIMIENTO.PERMISOS_NO_RETRIBUIDOS}`;
            }

            // BAJAS
            if (p.includes('baja') || (p.includes('enferm') && !p.includes('urgencia'))) {
                return `✅ ${CONOCIMIENTO.BAJAS_MEDICAS}`;
            }

            // PERMISOS RETRIBUIDOS
            if (p.includes('permiso')) {
                if (p.includes('matrimonio') || p.includes('boda')) {
                    return `✅ Permiso por matrimonio: ${CONOCIMIENTO.PERMISOS_RETRIBUIDOS.matrimonio}`;
                }
                if (p.includes('nacimiento') || p.includes('hijo')) {
                    return `✅ Permiso por nacimiento: ${CONOCIMIENTO.PERMISOS_RETRIBUIDOS.nacimiento}`;
                }
                if (p.includes('muerte') || p.includes('fallecimiento')) {
                    if (p.includes('conyugue') || p.includes('pareja')) {
                        return `✅ Permiso por fallecimiento: ${CONOCIMIENTO.PERMISOS_RETRIBUIDOS.defuncion_conyugue}`;
                    }
                    if (p.includes('padre') || p.includes('suegro')) {
                        return `✅ Permiso por fallecimiento: ${CONOCIMIENTO.PERMISOS_RETRIBUIDOS.defuncion_padres}`;
                    }
                    if (p.includes('hermano')) {
                        return `✅ Permiso por fallecimiento: ${CONOCIMIENTO.PERMISOS_RETRIBUIDOS.defuncion_hermanos}`;
                    }
                    return `✅ Permiso por fallecimiento: ${CONOCIMIENTO.PERMISOS_RETRIBUIDOS.defuncion_otros}`;
                }
                if (p.includes('medico') || p.includes('hospital') || p.includes('urgencia')) {
                    return `✅ Permiso por urgencia médica: ${CONOCIMIENTO.PERMISOS_RETRIBUIDOS.medico}`;
                }
                if (p.includes('carnet') || p.includes('dni')) {
                    return `✅ Permiso para carnet/DNI: ${CONOCIMIENTO.PERMISOS_RETRIBUIDOS.carnet}`;
                }
                return `✅ Permiso retribuido: Consulta qué tipo específico (matrimonio, nacimiento, fallecimiento, médico, carnet).`;
            }

            // SALARIOS
            if (p.includes('salario') || p.includes('sueldo') || p.includes('gano')) {
                let respuesta = `✅ Salarios 2026 - Jornada ${jornada}:\n`;
                if (jornada === 'Diario') {
                    respuesta += `• Peón: ${CONOCIMIENTO.SALARIO_DIARIO.peon}\n`;
                    respuesta += `• Oficial: ${CONOCIMIENTO.SALARIO_DIARIO.oficial}\n`;
                    respuesta += `• Capataz: ${CONOCIMIENTO.SALARIO_DIARIO.capataz}\n\n`;
                } else {
                    respuesta += `• Peón: ${CONOCIMIENTO.SALARIO_SDF.peon}\n`;
                    respuesta += `• Oficial: ${CONOCIMIENTO.SALARIO_SDF.oficial}\n`;
                    respuesta += `• Capataz: ${CONOCIMIENTO.SALARIO_SDF.capataz}\n\n`;
                }
                respuesta += `Plus especiales:\n`;
                respuesta += `• Turno noche: ${CONOCIMIENTO.PLUS.nocturno}\n`;
                respuesta += `• Dominical: ${CONOCIMIENTO.PLUS.dominical}\n`;
                respuesta += `• Festivo: ${CONOCIMIENTO.PLUS.festivo}\n`;
                respuesta += `• Antigüedad: ${CONOCIMIENTO.PLUS.antiguedad}`;
                return respuesta;
            }

            // HORARIOS
            if (p.includes('horario') || p.includes('turno') || p.includes('hora')) {
                let respuesta = `✅ Horarios - Jornada ${jornada}:\n`;
                respuesta += `• Mañana: ${CONOCIMIENTO.HORARIOS_DIARIO.manana}\n`;
                respuesta += `• Tarde: ${CONOCIMIENTO.HORARIOS_DIARIO.tarde}\n`;
                respuesta += `• Noche: ${CONOCIMIENTO.HORARIOS_DIARIO.noche}\n`;
                if (jornada === 'SDF') {
                    respuesta += `\nCaracterísticas SDF:\n${CONOCIMIENTO.HORARIOS_SDF.nota}`;
                }
                return respuesta;
            }

            return `❓ No encontré esa información. Pregunta sobre: vacaciones, permisos, bajas, salarios, horarios.`;
        }

        // ============================================
        // ESTADO GLOBAL
        // ============================================
        let appState = {
            isLoggedIn: false,
            role: null,
            worker: { name: '', empresa: '', turno: '', jornada: '' },
            chat: [],
            uploadedFiles: [],
            currentTab: 'consulta'
        };

        // ============================================
        // FUNCIONES CORE
        // ============================================
        function guardarEstado() {
            localStorage.setItem('convenioState', JSON.stringify({
                worker: appState.worker,
                chat: appState.chat,
                uploadedFiles: appState.uploadedFiles
            }));
        }

        function cargarEstado() {
            const datos = localStorage.getItem('convenioState');
            if (datos) {
                const parsed = JSON.parse(datos);
                appState.worker = parsed.worker || {};
                appState.chat = parsed.chat || [];
                appState.uploadedFiles = parsed.uploadedFiles || [];
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const nombre = form.querySelector('[name="nombre"]').value;
            const empresa = form.querySelector('[name="empresa"]').value;
            const turno = form.querySelector('[name="turno"]').value;
            const jornada = form.querySelector('[name="jornada"]').value;

            if (nombre && empresa && turno && jornada) {
                appState.worker = { name: nombre, empresa, turno, jornada };
                appState.isLoggedIn = true;
                appState.role = 'worker';
                guardarEstado();
                renderApp();
            }
        }

        function handleAdminLogin(codigo) {
            if (codigo === 'selur2212@') {
                appState.isLoggedIn = true;
                appState.role = 'admin';
                appState.worker = { name: 'Administrador', empresa: 'ADMIN', turno: '-', jornada: '-' };
                guardarEstado();
                renderApp();
            } else {
                alert('❌ Código incorrecto');
            }
        }

        function handleLogout() {
            appState.isLoggedIn = false;
            appState.role = null;
            appState.chat = [];
            appState.worker = {};
            localStorage.removeItem('convenioState');
            renderApp();
        }

        async function handleSendMessage(e) {
            e.preventDefault();
            const input = document.querySelector('[name="pregunta"]');
            const pregunta = input.value.trim();

            if (pregunta) {
                appState.chat.push({
                    tipo: 'user',
                    contenido: pregunta,
                    timestamp: new Date()
                });
                input.value = '';
                renderApp();

                // Simular pensamiento
                appState.chat.push({
                    tipo: 'assistant',
                    contenido: '',
                    thinking: true,
                    timestamp: new Date()
                });
                renderApp();
                
                await new Promise(resolve => setTimeout(resolve, 800));

                // Generar respuesta
                const respuesta = generarRespuesta(pregunta, appState.worker.jornada);
                appState.chat[appState.chat.length - 1] = {
                    tipo: 'assistant',
                    contenido: respuesta,
                    thinking: false,
                    timestamp: new Date()
                };
                
                guardarEstado();
                renderApp();
            }
        }

        function handleExportarResumen() {
            let resumen = `=== RESUMEN CONVENIO COLECTIVO ===\nFecha: ${new Date().toLocaleString('es-ES')}\n`;
            resumen += `Trabajador: ${appState.worker.name}\nEmpresa: ${appState.worker.empresa}\nTurno: ${appState.worker.turno}\nJornada: ${appState.worker.jornada}\n\n`;
            
            appState.chat.forEach(msg => {
                if (!msg.thinking) {
                    const tipo = msg.tipo === 'user' ? 'TÚ' : 'SISTEMA';
                    resumen += `[${tipo}]\n${msg.contenido}\n\n`;
                }
            });

            const blob = new Blob([resumen], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `resumen-${Date.now()}.txt`;
            a.click();
        }

        function handleFileUpload(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (evt) => {
                    appState.uploadedFiles.push({
                        name: file.name,
                        size: file.size,
                        id: Date.now() + Math.random()
                    });
                    guardarEstado();
                    renderApp();
                };
                reader.readAsText(file);
            });
        }

        function handleDeleteFile(id) {
            appState.uploadedFiles = appState.uploadedFiles.filter(f => f.id !== id);
            guardarEstado();
            renderApp();
        }

        // ============================================
        // RENDERIZADO
        // ============================================
        function renderLogin() {
            return `
            <div class="min-h-screen bg-gradient-to-b from-red-50 to-white flex items-center justify-center p-4">
                <div class="w-full max-w-md">
                    <div class="bg-white rounded-lg shadow-xl p-8">
                        <div class="text-center mb-8">
                            <div class="text-6xl font-bold text-red-600 mb-2">UGT</div>
                            <h1 class="text-2xl font-bold text-gray-800">Convenio Colectivo</h1>
                            <p class="text-sm text-gray-600 mt-2">LPV de Madrid Capital 2026-31</p>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-gray-50 p-6 rounded-lg">
                                <h2 class="text-lg font-bold text-gray-800 mb-4">¡Hola, Compañero!!</h2>
                                <form id="loginForm">
                                    <div class="mb-4">
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Nombre</label>
                                        <input type="text" name="nombre" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500">
                                    </div>
                                    <div class="mb-4">
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Empresa</label>
                                        <select name="empresa" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500">
                                            <option value="">Selecciona...</option>
                                            <option value="Prezero">Prezero</option>
                                            <option value="Urbaser">Urbaser</option>
                                            <option value="Valoriza">Valoriza</option>
                                            <option value="FCC">FCC</option>
                                        </select>
                                    </div>
                                    <div class="mb-4">
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Turno</label>
                                        <select name="turno" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500">
                                            <option value="">Selecciona...</option>
                                            <option value="Mañana">Mañana</option>
                                            <option value="Tarde">Tarde</option>
                                            <option value="Noche">Noche</option>
                                        </select>
                                    </div>
                                    <div class="mb-6">
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Jornada</label>
                                        <select name="jornada" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500">
                                            <option value="">Selecciona...</option>
                                            <option value="Diario">Diario</option>
                                            <option value="SDF">SDF</option>
                                        </select>
                                    </div>
                                    <button type="submit" class="w-full bg-red-600 text-white font-bold py-2 rounded-lg hover:bg-red-700">Acceder</button>
                                </form>
                            </div>

                            <div class="border-t pt-6">
                                <p class="text-xs text-gray-500 mb-2">Administrador</p>
                                <div class="flex gap-2">
                                    <input type="password" id="adminCode" placeholder="Código..." class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 text-sm">
                                    <button onclick="window.handleAdminLogin(document.getElementById('adminCode').value)" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">🛡️</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        function renderApp() {
            const root = document.getElementById('app');

            if (!appState.isLoggedIn) {
                root.innerHTML = renderLogin();
                document.getElementById('loginForm')?.addEventListener('submit', handleLogin);
                return;
            }

            let contenido = appState.currentTab === 'consulta' ? renderConsulta() : renderDocumentacion();

            root.innerHTML = `
            <div class="flex flex-col h-screen bg-white">
                <header class="bg-red-600 text-white px-6 py-4 shadow-lg flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="text-4xl font-bold">UGT</div>
                        <div>
                            <h1 class="text-lg font-bold">Convenio Colectivo LPV de Madrid Capital 2026-31</h1>
                            <p class="text-xs text-red-100">${appState.role === 'admin' ? '👤 Admin' : '👷 ' + appState.worker.name}</p>
                        </div>
                    </div>
                    <button onclick="window.handleLogout()" class="bg-red-700 hover:bg-red-800 px-4 py-2 rounded-lg text-sm font-medium">Desloguear</button>
                </header>

                <div class="bg-gray-100 border-b border-gray-300 flex">
                    <button onclick="(() => { appState.currentTab = 'consulta'; window.renderApp(); })()" class="px-6 py-3 font-medium ${appState.currentTab === 'consulta' ? 'border-b-4 border-red-600 text-red-600' : 'text-gray-600'} hover:bg-gray-200">
                        💬 Consulta
                    </button>
                    ${appState.role === 'admin' ? `<button onclick="(() => { appState.currentTab = 'documentacion'; window.renderApp(); })()" class="px-6 py-3 font-medium ${appState.currentTab === 'documentacion' ? 'border-b-4 border-red-600 text-red-600' : 'text-gray-600'} hover:bg-gray-200">
                        📄 Documentación
                    </button>` : ''}
                </div>

                <div class="flex-1 overflow-auto">
                    ${contenido}
                </div>
            </div>
            `;

            document.querySelector('[name="pregunta"]')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage({ target: { querySelector: () => document.querySelector('[name="pregunta"]') } });
                }
            });
        }

        function renderConsulta() {
            return `
            <div class="flex flex-col h-full">
                <div class="flex-1 overflow-auto p-6 space-y-4 bg-gray-50">
                    ${appState.chat.length === 0 ? `
                        <div class="text-center py-12">
                            <p class="text-gray-700 text-lg font-medium">Bienvenido, ${appState.worker.name}</p>
                            <p class="text-gray-500 text-sm mt-2">Pregunta sobre el Convenio</p>
                        </div>
                    ` : ''}
                    
                    ${appState.chat.map(msg => `
                        <div class="chat-message ${msg.tipo === 'user' ? 'flex justify-end' : 'flex justify-start'}">
                            <div class="max-w-2xl ${msg.tipo === 'user' ? 'bg-red-600 text-white' : 'bg-white border border-gray-300'} rounded-lg p-4 text-sm">
                                ${msg.thinking ? '<div class="thinking-dots">⏳ Analizando...</div>' : msg.contenido.split('\n').map(line => `<p>${line}</p>`).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div class="bg-white border-t border-gray-300 p-4">
                    <form class="flex gap-2" onsubmit="window.handleSendMessage(event)">
                        <input type="text" name="pregunta" placeholder="Pregunta sobre permisos, vacaciones, salario, horarios..." class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 text-sm">
                        <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 font-medium">Enviar</button>
                    </form>
                    ${appState.chat.length > 0 ? `<button onclick="window.handleExportarResumen()" class="mt-2 w-full bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 text-sm">📥 Exportar</button>` : ''}
                </div>
            </div>
            `;
        }

        function renderDocumentacion() {
            return `
            <div class="p-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">📄 Documentos</h2>
                <div class="bg-red-50 border-2 border-dashed border-red-300 rounded-lg p-8 text-center mb-8 cursor-pointer hover:bg-red-100" onclick="document.getElementById('fileInput').click()">
                    <p class="text-gray-700 font-medium">Arrastra o haz clic</p>
                    <p class="text-gray-600 text-sm mt-2">.md, .pdf, .txt</p>
                    <input type="file" id="fileInput" multiple accept=".md,.pdf,.txt" class="hidden" onchange="window.handleFileUpload(event)">
                </div>

                <div class="space-y-3">
                    ${appState.uploadedFiles.length === 0 ? `<p class="text-gray-400 text-center py-8">Sin archivos</p>` : appState.uploadedFiles.map(file => `
                        <div class="bg-gray-100 p-4 rounded-lg flex justify-between items-center">
                            <div>
                                <p class="font-medium text-gray-800">${file.name}</p>
                                <p class="text-xs text-gray-600">${(file.size / 1024).toFixed(2)} KB</p>
                            </div>
                            <button onclick="window.handleDeleteFile(${file.id})" class="bg-red-600 text-white px-3 py-1 rounded text-sm hover:bg-red-700">Eliminar</button>
                        </div>
                    `).join('')}
                </div>
            </div>
            `;
        }

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            cargarEstado();
            renderApp();
        });

        window.handleLogin = handleLogin;
        window.handleAdminLogin = handleAdminLogin;
        window.handleLogout = handleLogout;
        window.handleSendMessage = handleSendMessage;
        window.handleExportarResumen = handleExportarResumen;
        window.handleFileUpload = handleFileUpload;
        window.handleDeleteFile = handleDeleteFile;
        window.renderApp = renderApp;
    </script>
</body>
</html>
