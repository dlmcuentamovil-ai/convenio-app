    <script type="text/babel">

      // === Datos del convenio (JSON estructurado del .md) ===

        },
        conductores: {
          carnet_minimo: "C",
          vehiculos_exclusivos_conductores: [
            "camiones recolectores",
            "vehículos > 3500 kg",
            "barredoras > 2000 kg",
            "baldeadoras",
          ],
          vehiculos_peinado: "carnet B",
          retirada_carnet: {
            mantiene_categoria_salario: true,
            excepcion: "embriaguez o toxicomanía",
          },
          tiempo_examen_carnet: "jornada de trabajo",
        },
        ascensos: {
          libre_designacion: [
            "Jefe de Servicio",
            "Encargado General",
            "Subencargado General",
          ],
          resto: {
            criterios: ["concurso", "examen", "antigüedad"],
            peso: "50% cada uno",
          },
          requisito_antiguedad_meses: 6,
          convocatoria_publicada_minimo_dias: 10,
        },
        contratacion: {
          maximo_eventualidad: {
            TT: "10%",
            SDF: "18%",
          },
          no_computan: [
            "eventuales verano",
            "relevo",
            "campañas especiales",
            "interinidades",
            "excedencias",
            "sustituciones",
          ],
          contrato_circunstancias: {
            maximo_meses: 12,
            periodo_referencia_meses: 18,
          },
          transformaciones_SDF_a_TT: {
            ratio: "7 de cada 10",
            requisito_antiguedad_meses: 6,
          },
        },
      };

      // Utilidad: convertir objeto a texto legible
      const prettyPrint = (obj) => {
        if (typeof obj === "string" || typeof obj === "number" || typeof obj === "boolean") {
          return String(obj);
        }
        if (Array.isArray(obj)) {
          return obj.join(", ");
        }
        if (obj && typeof obj === "object") {
          return Object.entries(obj)
            .map(([k, v]) => `${k}: ${prettyPrint(v)}`)
            .join(" | ");
        }
        return "";
      };

      // Búsqueda semántica muy simple por palabras clave + jornada
      const searchConvenio = (question, jornadaKey) => {
        const q = question.toLowerCase();

        const matches = [];

        const pushMatch = (section, key, value, extra = "") => {
          matches.push({
            section,
            key,
            value,
            extra,
          });
        };

        // Normalización básica de sinónimos
        const containsAny = (words) => words.some((w) => q.includes(w));

        // Jornada / horario
        if (containsAny(["jornada", "horario", "horas", "semanales", "bocadillo", "descanso"])) {
          const j = CONVENIO_DATA.jornada[jornadaKey];
          if (j) {
            pushMatch(
              "jornada",
              jornadaKey,
              j,
              "Condiciones de jornada para tu tipo de jornada."
            );
          }
        }

        // Vacaciones
        if (containsAny(["vacaciones", "verano", "días de vacaciones", "dias de vacaciones"])) {
          const v = CONVENIO_DATA.vacaciones[jornadaKey];
          if (v) {
            pushMatch(
              "vacaciones",
              jornadaKey,
              v,
              "Régimen de vacaciones según tu jornada."
            );
          }
        }

        // Horas extra
        if (containsAny(["horas extra", "extraordinarias", "extras"])) {
          pushMatch(
            "horas_extraordinarias",
            "general",
            CONVENIO_DATA.horas_extraordinarias,
            "Regulación general de horas extraordinarias."
          );
        }

        // Excedencias
        if (containsAny(["excedencia", "excedencias"])) {
          pushMatch(
            "excedencias",
            "general",
            CONVENIO_DATA.excedencias,
            "Tipos de excedencias y requisitos."
          );
        }

        // Permisos
        if (
          containsAny([
            "permiso",
            "permisos",
            "matrimonio",
            "fallecimiento",
            "hospitalización",
            "hospitalizacion",
            "traslado de domicilio",
            "dni",
            "carnet de conducir",
          ])
        ) {
          pushMatch(
            "permisos",
            "general",
            CONVENIO_DATA.permisos,
            "Permisos retribuidos y condiciones."
          );
        }

        // Conductores
        if (
          containsAny([
            "conductor",
            "carnet",
            "carné",
            "camión",
            "camion",
            "barredora",
            "baldeadora",
          ])
        ) {
          pushMatch(
            "conductores",
            "general",
            CONVENIO_DATA.conductores,
            "Condiciones específicas para conductores."
          );
        }

        // Traslados
        if (containsAny(["traslado", "traslados", "cambio de centro"])) {
          pushMatch(
            "traslados",
            "general",
            CONVENIO_DATA.traslados,
            "Normas sobre traslados."
          );
        }

        // Sanciones
        if (containsAny(["sanción", "sancion", "sanciones", "falta grave", "falta muy grave"])) {
          pushMatch(
            "sanciones",
            "general",
            CONVENIO_DATA.sanciones,
            "Comunicación de sanciones al comité."
          );
        }

        // Ascensos
        if (containsAny(["ascenso", "ascensos", "promoción", "promocion"])) {
          pushMatch(
            "ascensos",
            "general",
            CONVENIO_DATA.ascensos,
            "Sistema de ascensos y requisitos."
          );
        }

        // Contratación
        if (
          containsAny([
            "contratación",
            "contratacion",
            "eventualidad",
            "contrato",
            "circunstancias",
          ])
        ) {
          pushMatch(
            "contratacion",
            "general",
            CONVENIO_DATA.contratacion,
            "Normas de contratación y eventualidad."
          );
        }

        // Datos generales
        if (containsAny(["ámbito", "ambito", "vigencia", "entrada en vigor", "denuncia"])) {
          pushMatch(
            "datos_generales",
            "general",
            CONVENIO_DATA.datos_generales,
            "Ámbito y vigencia del convenio."
          );
        }

        return matches;
      };

      const buildAnswerFromMatches = (matches, jornadaKey) => {
        if (!matches || matches.length === 0) {
          return {
            needsClarification: true,
            text:
              "Analizando documento...\n\n" +
              "Verificando puntos A y B...\n\n" +
              "Conclusión: No encuentro información clara y directa para tu pregunta. " +
              "¿Puedes concretar un poco más lo que necesitas (por ejemplo: vacaciones, permisos, jornada, excedencias...)?",
          };
        }

        if (matches.length > 4) {
          return {
            needsClarification: true,
            text:
              "Analizando documento...\n\n" +
              "Verificando puntos A y B...\n\n" +
              "Conclusión: Tu pregunta afecta a varios bloques del convenio (por ejemplo: " +
              matches
                .slice(0, 4)
                .map((m) => m.section)
                .join(", ") +
              "). ¿Podrías indicar exactamente sobre qué tema quieres la respuesta?",
          };
        }

        const lines = [];
        lines.push("Analizando documento...");
        lines.push("");
        lines.push("Verificando puntos A y B...");

        const detalle = matches
          .map((m, idx) => {
            const label = `Bloque ${idx + 1} (${m.section}${m.key !== "general" ? " - " + m.key : ""
              }):`;
            return `${label}\n${prettyPrint(m.value)}`;
          })
          .join("\n\n");

        lines.push("");
        lines.push(detalle);
        lines.push("");
        lines.push("Conclusión:");

        const jornadaLabel = jornadaKey === "TT" ? "jornada diaria (TT)" : "jornada SDF";

        lines.push(
          `La respuesta se basa en el bloque o bloques anteriores, aplicados específicamente a tu ${jornadaLabel}.`
        );

        return {
          needsClarification: false,
          text: lines.join("\n"),
        };
      };

      const App = () => {
        const [role, setRole] = useState("guest"); // guest | user | admin
        const [adminCode, setAdminCode] = useState("");
        const [authError, setAuthError] = useState("");

        const [formData, setFormData] = useState({
          nombre: "",
          empresa: "",
          turno: "",
          jornada: "",
        });

        const [activeTab, setActiveTab] = useState("consulta"); // consulta | docs

        const [chatMessages, setChatMessages] = useState([]);
        const [currentQuestion, setCurrentQuestion] = useState("");
        const [isThinking, setIsThinking] = useState(false);
        const [lastAnswer, setLastAnswer] = useState("");

        const [uploadedDocs, setUploadedDocs] = useState([]);
        const [selectedDoc, setSelectedDoc] = useState(null);
        const [selectedDocContent, setSelectedDocContent] = useState("");

        const jornadaKey = formData.jornada === "SDF" ? "SDF" : formData.jornada === "Diario" ? "TT" : null;

        const isFormComplete =
          formData.nombre &&
          formData.empresa &&
          formData.turno &&
          formData.jornada &&
          (role === "user" || role === "admin");

        const handleLoginAsUser = () => {
          if (!formData.nombre || !formData.empresa || !formData.turno || !formData.jornada) {
            alert("Rellena todos los campos del formulario antes de continuar.");
            return;
          }
          setRole("user");
        };

        const handleAdminAccess = () => {
          if (adminCode === "selur2212@") {
            setRole("admin");
            setAuthError("");
          } else {
            setAuthError("Código incorrecto.");
          }
        };

        const handleLogout = () => {
          setRole("guest");
          setAdminCode("");
          setAuthError("");
        };

        const handleFormChange = (field, value) => {
          setFormData((prev) => ({ ...prev, [field]: value }));
        };

        const handleAskQuestion = () => {
          if (!isFormComplete) {
            alert("Debes completar el formulario y estar logueado como usuario o admin.");
            return;
          }
          if (!currentQuestion.trim()) return;

          const question = currentQuestion.trim();
          setCurrentQuestion("");

          const newMessages = [
            ...chatMessages,
            {
              id: Date.now(),
              role: "user",
              text: question,
            },
          ];
          setChatMessages(newMessages);
          setIsThinking(true);

          setTimeout(() => {
            const matches = searchConvenio(question, jornadaKey || "TT");
            const answerObj = buildAnswerFromMatches(matches, jornadaKey || "TT");

            const assistantMessage = {
              id: Date.now() + 1,
              role: "assistant",
              text: answerObj.text,
            };

            setChatMessages((prev) => [...prev, assistantMessage]);
            setIsThinking(false);
            setLastAnswer(answerObj.text);
          }, 900);
        };

        const handleKeyDown = (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            handleAskQuestion();
          }
        };

        const handleFiles = (files) => {
          const arr = Array.from(files);
          const withMeta = arr.map((file) => ({
            id: `${file.name}-${file.lastModified}-${Math.random()}`,
            file,
            name: file.name,
            type: file.type,
          }));
          setUploadedDocs((prev) => [...prev, ...withMeta]);
        };

        const handleDrop = (e) => {
          e.preventDefault();
          const files = e.dataTransfer.files;
          handleFiles(files);
        };

        const handleDragOver = (e) => {
          e.preventDefault();
        };

        const handleFileInputChange = (e) => {
          const files = e.target.files;
          handleFiles(files);
        };

        const handleDeleteDoc = (id) => {
          setUploadedDocs((prev) => prev.filter((d) => d.id !== id));
          if (selectedDoc && selectedDoc.id === id) {
            setSelectedDoc(null);
            setSelectedDocContent("");
          }
        };

        const handleViewDoc = (doc) => {
          setSelectedDoc(doc);
          setSelectedDocContent("");

          if (
            doc.file.type === "text/markdown" ||
            doc.file.type === "text/plain" ||
            doc.name.endsWith(".md") ||
            doc.name.endsWith(".txt")
          ) {
            const reader = new FileReader();
            reader.onload = (ev) => {
              setSelectedDocContent(ev.target.result);
            };
            reader.readAsText(doc.file);
          } else {
            setSelectedDocContent("");
          }
        };

        const handleExportSummary = () => {
          if (!lastAnswer) {
            alert("No hay ninguna respuesta reciente para exportar.");
            return;
          }
          const header = `Resumen de consulta - Convenio Colectivo LPV de Madrid Capital 2026-31\n\n`;
          const workerInfo = `Trabajador: ${formData.nombre || "-"}\nEmpresa: ${
            formData.empresa || "-"
          }\nTurno: ${formData.turno || "-"}\nJornada: ${
            formData.jornada || "-"
          }\n\n`;
          const content = header + workerInfo + lastAnswer;

          const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "resumen_consulta_convenio.txt";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        };

        return (
          <div className="min-h-screen flex flex-col bg-white">
            {/* Header */}
            <header className="w-full border-b border-gray-200 bg-white">
              <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                <div className="flex items-center space-x-3">
                  <img
                    src="image_0.png"
                    alt="Logo"
                    className="h-10 w-auto object-contain"
                  />
                  <div className="flex flex-col">
                    <span className="text-sm font-semibold text-primary uppercase tracking-wide">
                      Convenio Colectivo LPV de Madrid Capital 2026-31
                    </span>
                    <span className="text-xs text-gray-500">
                      Herramienta de consulta para trabajadores
                    </span>
                  </div>
                </div>

                <div className="flex items-center space-x-3">
                  {/* Campo código admin */}
                  <div className="flex items-center border border-gray-300 rounded-md overflow-hidden">
                    <input
                      type="password"
                      value={adminCode}
                      onChange={(e) => setAdminCode(e.target.value)}
                      placeholder="Código admin"
                      className="px-2 py-1 text-sm outline-none"
                    />
                    <button
                      onClick={handleAdminAccess}
                      className="px-2 py-1 bg-primary text-white hover:bg-red-700 flex items-center justify-center"
                      title="Acceder como ADMIN"
                    >
                      <Shield className="w-4 h-4" />
                    </button>
                  </div>
                  {authError && (
                    <span className="text-xs text-red-600">{authError}</span>
                  )}

                  {/* Logout */}
                  {(role === "user" || role === "admin") && (
                    <button
                      onClick={handleLogout}
                      className="flex items-center space-x-1 text-xs text-gray-700 border border-gray-300 rounded-md px-2 py-1 hover:bg-gray-100"
                    >
                      <LogOut className="w-4 h-4" />
                      <span>Deslogarse</span>
                    </button>
                  )}
                </div>
              </div>
            </header>

            {/* Main */}
            <main className="flex-1">
              <div className="max-w-6xl mx-auto px-4 py-4">
                {/* Formulario de acceso */}
                <section className="mb-4 border border-gray-200 rounded-lg p-4 bg-red-50">
                  <h2 className="text-lg font-semibold text-primary mb-2">
                    Hola, Compañero!!
                  </h2>
                  <p className="text-xs text-gray-700 mb-3">
                    Rellena tus datos para poder realizar consultas. Si introduces el
                    código correcto, accederás como ADMIN y podrás gestionar
                    documentación.
                  </p>
                  <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <div className="flex flex-col">
                      <label className="text-xs font-medium text-gray-700 mb-1">
                        Nombre
                      </label>
                      <input
                        type="text"
                        value={formData.nombre}
                        onChange={(e) =>
                          handleFormChange("nombre", e.target.value)
                        }
                        className="border border-gray-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-primary"
                        placeholder="Tu nombre"
                      />
                    </div>
                    <div className="flex flex-col">
                      <label className="text-xs font-medium text-gray-700 mb-1">
                        Empresa
                      </label>
                      <select
                        value={formData.empresa}
                        onChange={(e) =>
                          handleFormChange("empresa", e.target.value)
                        }
                        className="border border-gray-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-primary"
                      >
                        <option value="">Selecciona empresa</option>
                        <option value="Prezero">Prezero</option>
                        <option value="Urbaser">Urbaser</option>
                        <option value="Valoriza">Valoriza</option>
                        <option value="FCC">FCC</option>
                      </select>
                    </div>
                    <div className="flex flex-col">
                      <label className="text-xs font-medium text-gray-700 mb-1">
                        Turno
                      </label>
                      <select
                        value={formData.turno}
                        onChange={(e) =>
                          handleFormChange("turno", e.target.value)
                        }
                        className="border border-gray-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-primary"
                      >
                        <option value="">Selecciona turno</option>
                        <option value="Mañana">Mañana</option>
                        <option value="Tarde">Tarde</option>
                        <option value="Noche">Noche</option>
                      </select>
                    </div>
                    <div className="flex flex-col">
                      <label className="text-xs font-medium text-gray-700 mb-1">
                        Jornada
                      </label>
                      <select
                        value={formData.jornada}
                        onChange={(e) =>
                          handleFormChange("jornada", e.target.value)
                        }
                        className="border border-gray-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-primary"
                      >
                        <option value="">Selecciona jornada</option>
                        <option value="Diario">Diario</option>
                        <option value="SDF">SDF</option>
                      </select>
                    </div>
                  </div>

                  <div className="mt-3 flex items-center justify-between">
                    <div className="text-xs text-gray-600">
                      Rol actual:{" "}
                      <span className="font-semibold text-primary">
                        {role === "guest"
                          ? "Invitado (sin acceso a consulta)"
                          : role === "user"
                          ? "Usuario"
                          : "ADMIN"}
                      </span>
                    </div>
                    <div className="flex space-x-2">
                      <button
                        onClick={handleLoginAsUser}
                        className="px-3 py-1 text-xs rounded-md bg-primary text-white hover:bg-red-700 flex items-center space-x-1"
                      >
                        <MessageCircle className="w-4 h-4" />
                        <span>Acceder como Usuario</span>
                      </button>
                    </div>
                  </div>
                </section>

                {/* Tabs */}
                <div className="border-b border-gray-200 mb-4">
                  <nav className="-mb-px flex space-x-4">
                    <button
                      onClick={() => setActiveTab("consulta")}
                      className={`px-3 py-2 text-sm font-medium border-b-2 ${
                        activeTab === "consulta"
                          ? "border-primary text-primary"
                          : "border-transparent text-gray-500 hover:text-gray-700"
                      }`}
                    >
                      Consulta
                    </button>
                    <button
                      onClick={() => setActiveTab("docs")}
                      className={`px-3 py-2 text-sm font-medium border-b-2 ${
                        activeTab === "docs"
                          ? "border-primary text-primary"
                          : "border-transparent text-gray-500 hover:text-gray-700"
                      }`}
                    >
                      Documentación
                    </button>
                  </nav>
                </div>

                {/* Contenido pestañas */}
                {activeTab === "consulta" && (
                  <section className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    {/* Chat */}
                    <div className="lg:col-span-2 border border-gray-200 rounded-lg flex flex-col h-[480px]">
                      <div className="flex items-center justify-between px-3 py-2 border-b border-gray-200 bg-gray-50">
                        <div className="flex items-center space-x-2">
                          <MessageCircle className="w-4 h-4 text-primary" />
                          <span className="text-sm font-semibold">
                            Chat de consulta
                          </span>
                        </div>
                        <button
                          onClick={handleExportSummary}
                          className="flex items-center space-x-1 text-xs text-primary border border-primary rounded-md px-2 py-1 hover:bg-primary hover:text-white"
                        >
                          <FileDown className="w-4 h-4" />
                          <span>Exportar Resumen</span>
                        </button>
                      </div>
                      <div className="flex-1 overflow-y-auto p-3 space-y-2 text-sm">
                        {chatMessages.length === 0 && (
                          <div className="text-xs text-gray-500">
                            Escribe tu pregunta sobre el convenio (por ejemplo:
                            vacaciones, permisos, jornada, excedencias...). La
                            respuesta se basará únicamente en el documento.
                          </div>
                        )}
                        {chatMessages.map((msg) => (
                          <div
                            key={msg.id}
                            className={`flex ${
                              msg.role === "user"
                                ? "justify-end"
                                : "justify-start"
                            }`}
                          >
                            <div
                              className={`max-w-[80%] rounded-lg px-3 py-2 whitespace-pre-wrap ${
                                msg.role === "user"
                                  ? "bg-primary text-white"
                                  : "bg-gray-100 text-gray-900"
                              }`}
                            >
                              {msg.text}
                            </div>
                          </div>
                        ))}
                        {isThinking && (
                          <div className="flex justify-start">
                            <div className="bg-gray-100 text-gray-700 rounded-lg px-3 py-2 text-xs">
                              Analizando documento...
                            </div>
                          </div>
                        )}
                      </div>
                      <div className="border-t border-gray-200 p-2">
                        <textarea
                          value={currentQuestion}
                          onChange={(e) => setCurrentQuestion(e.target.value)}
                          onKeyDown={handleKeyDown}
                          rows={2}
                          className="w-full border border-gray-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-primary"
                          placeholder="Escribe tu pregunta aquí..."
                        />
                        <div className="mt-2 flex justify-end">
                          <button
                            onClick={handleAskQuestion}
                            className="px-3 py-1 text-sm rounded-md bg-primary text-white hover:bg-red-700"
                          >
                            Preguntar
                          </button>
                        </div>
                      </div>
                    </div>

                    {/* Panel lateral: contexto */}
                    <div className="border border-gray-200 rounded-lg p-3 bg-gray-50 text-xs space-y-2">
                      <h3 className="text-sm font-semibold text-primary mb-1">
                        Contexto de la consulta
                      </h3>
                      <div>
                        <span className="font-semibold">Nombre:</span>{" "}
                        {formData.nombre || "-"}
                      </div>
                      <div>
                        <span className="font-semibold">Empresa:</span>{" "}
                        {formData.empresa || "-"}
                      </div>
                      <div>
                        <span className="font-semibold">Turno:</span>{" "}
                        {formData.turno || "-"}
                      </div>
                      <div>
                        <span className="font-semibold">Jornada:</span>{" "}
                        {formData.jornada || "-"}
                      </div>
                      <div>
                        <span className="font-semibold">Rol:</span>{" "}
                        {role === "guest"
                          ? "Invitado"
                          : role === "user"
                          ? "Usuario"
                          : "ADMIN"}
                      </div>
                      <hr className="my-2" />
                      <p className="text-[11px] text-gray-600">
                        REGLA DE ORO: La herramienta no inventa información. Si
                        la respuesta no es clara en el documento, se te pedirá
                        que concretes más la pregunta antes de dar una
                        conclusión.
                      </p>
                      <p className="text-[11px] text-gray-600">
                        Recuerda indicar siempre tu tipo de jornada (Diario o
                        SDF) en el formulario, ya que algunas condiciones
                        cambian según el colectivo.
                      </p>
                    </div>
                  </section>
                )}

                {activeTab === "docs" && (
                  <section className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    {/* Gestión de documentos (solo admin) */}
                    <div className="lg:col-span-1 border border-gray-200 rounded-lg p-3">
                      <div className="flex items-center space-x-2 mb-2">
                        <Upload className="w-4 h-4 text-primary" />
                        <h3 className="text-sm font-semibold text-primary">
                          Gestión de documentación
                        </h3>
                      </div>
                      {role !== "admin" && (
                        <p className="text-xs text-gray-600">
                          Solo el rol ADMIN puede subir, modificar o eliminar
                          archivos. Introduce el código en el header para
                          acceder como ADMIN.
                        </p>
                      )}
                      {role === "admin" && (
                        <>
                          <div
                            onDrop={handleDrop}
                            onDragOver={handleDragOver}
                            className="mt-2 border-2 border-dashed border-gray-300 rounded-md p-4 text-center text-xs text-gray-600 hover:border-primary cursor-pointer"
                          >
                            Arrastra aquí tus archivos .md, .pdf o .txt
                          </div>
                          <div className="mt-2">
                            <input
                              type="file"
                              multiple
                              accept=".md,.pdf,.txt,text/plain,application/pdf"
                              onChange={handleFileInputChange}
                              className="text-xs"
                            />
                          </div>
                          <div className="mt-3">
                            <h4 className="text-xs font-semibold mb-1">
                              Archivos subidos
                            </h4>
                            {uploadedDocs.length === 0 && (
                              <p className="text-xs text-gray-500">
                                No hay archivos subidos todavía.
                              </p>
                            )}
                            <ul className="space-y-1 max-h-48 overflow-y-auto text-xs">
                              {uploadedDocs.map((doc) => (
                                <li
                                  key={doc.id}
                                  className="flex items-center justify-between border border-gray-200 rounded-md px-2 py-1 bg-gray-50"
                                >
                                  <div className="flex items-center space-x-1">
                                    <FileText className="w-3 h-3 text-primary" />
                                    <span className="truncate max-w-[120px]">
                                      {doc.name}
                                    </span>
                                  </div>
                                  <div className="flex items-center space-x-1">
                                    <button
                                      onClick={() => handleViewDoc(doc)}
                                      className="text-[11px] text-primary hover:underline"
                                    >
                                      Ver
                                    </button>
                                    <button
                                      onClick={() => handleDeleteDoc(doc.id)}
                                      className="text-[11px] text-red-600 hover:underline"
                                    >
                                      Eliminar
                                    </button>
                                  </div>
                                </li>
                              ))}
                            </ul>
                          </div>
                        </>
                      )}
                    </div>

                    {/* Visor de documentos (solo admin) */}
                    <div className="lg:col-span-2 border border-gray-200 rounded-lg p-3">
                      <div className="flex items-center justify-between mb-2">
                        <div className="flex items-center space-x-2">
                          <FileText className="w-4 h-4 text-primary" />
                          <h3 className="text-sm font-semibold text-primary">
                            Visor de documentación
                          </h3>
                        </div>
                        {selectedDoc && (
                          <button
                            onClick={() => {
                              setSelectedDoc(null);
                              setSelectedDocContent("");
                            }}
                            className="flex items-center space-x-1 text-xs text-gray-600 hover:text-gray-900"
                          >
                            <X className="w-3 h-3" />
                            <span>Cerrar</span>
                          </button>
                        )}
                      </div>
                      {role !== "admin" && (
                        <p className="text-xs text-gray-600">
                          Solo el rol ADMIN puede visualizar los archivos
                          subidos. Introduce el código en el header para acceder
                          como ADMIN.
                        </p>
                      )}
                      {role === "admin" && (
                        <div className="h-[420px] border border-gray-200 rounded-md overflow-hidden bg-gray-50">
                          {!selectedDoc && (
                            <div className="h-full flex items-center justify-center text-xs text-gray-500 px-4 text-center">
                              Selecciona un archivo de la lista para visualizar
                              su contenido. Los archivos .md y .txt se mostrarán
                              como texto; los .pdf se abrirán en un visor
                              embebido del navegador.
                            </div>
                          )}
                          {selectedDoc && (
                            <div className="h-full flex flex-col">
                              <div className="px-3 py-2 border-b border-gray-200 bg-white text-xs flex justify-between items-center">
                                <span className="font-semibold">
                                  {selectedDoc.name}
                                </span>
                                <span className="text-gray-500">
                                  {selectedDoc.type || "tipo desconocido"}
                                </span>
                              </div>
                              <div className="flex-1 overflow-auto bg-white">
                                {(selectedDoc.file.type === "application/pdf" ||
                                  selectedDoc.name.endsWith(".pdf")) && (
                                  <iframe
                                    title={selectedDoc.name}
                                    src={URL.createObjectURL(selectedDoc.file)}
                                    className="w-full h-full"
                                  />
                                )}
                                {(selectedDoc.file.type === "text/markdown" ||
                                  selectedDoc.file.type === "text/plain" ||
                                  selectedDoc.name.endsWith(".md") ||
                                  selectedDoc.name.endsWith(".txt")) && (
                                  <pre className="p-3 text-[11px] whitespace-pre-wrap">
                                    {selectedDocContent ||
                                      "Cargando contenido..."}
                                  </pre>
                                )}
                                {!selectedDoc.name.match(/\.(pdf|md|txt)$/i) &&
                                  !selectedDoc.file.type && (
                                    <div className="p-3 text-xs text-gray-500">
                                      Tipo de archivo no soportado para vista
                                      previa.
                                    </div>
                                  )}
                              </div>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  </section>
                )}
              </div>
            </main>

            {/* Footer */}
            <footer className="border-t border-gray-200 py-2 text-center text-[11px] text-gray-500">
              Convenio Colectivo LPV de Madrid Capital 2026-31 · Herramienta de
              consulta interna
            </footer>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
