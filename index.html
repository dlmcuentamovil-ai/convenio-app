<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charSet="UTF-8" />
    <title>Convenio LPV Madrid 2026-31</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#C8102E",
            },
          },
        },
      };
    </script>

    <!-- React / ReactDOM / Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Estilos del chat -->
    <style>
      .fade-in {
        animation: fadeIn 0.25s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .bubble-user {
        background: #C8102E;
        color: white;
        padding: 10px 14px;
        border-radius: 14px;
        max-width: 80%;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      }

      .bubble-ai {
        background: #f3f4f6;
        color: #333;
        padding: 10px 14px;
        border-radius: 14px;
        max-width: 80%;
        border-left: 4px solid #C8102E;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      }

      .chat-input {
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 8px;
        resize: none;
        transition: 0.2s;
      }
      .chat-input:focus {
        border-color: #C8102E;
        box-shadow: 0 0 0 2px rgba(200,16,46,0.2);
        outline: none;
      }

      .btn-primary {
        background: #C8102E;
        color: white;
        padding: 8px 14px;
        border-radius: 10px;
        transition: 0.2s;
      }
      .btn-primary:hover {
        background: #a50d26;
      }
    </style>
  </head>

  <body class="bg-white text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      /* ICONOS SVG */
      const IconDownload = () => (
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
          <path d="M5 20h14v-2H5m7-14v10l4-4h-3V6h-2v6H8l4 4z"/>
        </svg>
      );

      const IconShield = () => (
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
        </svg>
      );

      const IconLogout = () => (
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
          <path d="M16 13v-2H7V8l-5 4 5 4v-3h9zM20 3h-8v2h8v14h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
        </svg>
      );

      /* JSON DEL CONVENIO */
      const CONVENIO_DATA = {
        vacaciones: {
          TT: { dias: 31, periodo: "julio-agosto" },
          SDF: { dias: 10, periodo: "julio-agosto" }
        },
        jornada: {
          TT: { horas: "35h semanales", bocadillo: "30 min computables" },
          SDF: { horas: "7h/día", bocadillo: "30 min computables" }
        }
      };

      const prettyPrint = (obj) => JSON.stringify(obj, null, 2);

      /* BUSCADOR */
      const searchConvenio = (q, jornadaKey) => {
        q = q.toLowerCase();
        const matches = [];

        if (q.includes("vacaciones")) {
          matches.push({ section: "vacaciones", value: CONVENIO_DATA.vacaciones[jornadaKey] });
        }
        if (q.includes("jornada") || q.includes("horas")) {
          matches.push({ section: "jornada", value: CONVENIO_DATA.jornada[jornadaKey] });
        }

        return matches;
      };

      /* RESPUESTA VISUAL */
      const buildAnswer = (matches, jornadaKey) => {
        if (matches.length === 0) {
          return (
            "⚠️ *Falta un dato clave.*\n" +
            "Indica si hablas de **vacaciones**, **permisos**, **jornada** o **otro tema**."
          );
        }

        let text = "🔍 **Análisis del documento**\nHe revisado los apartados relacionados.\n\n";

        text += "📄 **Información encontrada**\n";
        matches.forEach((m) => {
          text += `• **${m.section.toUpperCase()}** → ${prettyPrint(m.value)}\n`;
        });

        text += "\n📌 **Aplicado a tu jornada**\n";
        text += jornadaKey === "TT"
          ? "• Jornada seleccionada: **TT (Diario)**\n"
          : "• Jornada seleccionada: **SDF (Sábados, Domingos y Festivos)**\n";

        text += "\n🧠 **Conclusión**\nLa información anterior resume lo que indica el convenio para tu caso.\n";

        return text;
      };

      /* APP */
      const App = () => {
        const [role, setRole] = useState("guest");
        const [adminCode, setAdminCode] = useState("");
        const [formData, setFormData] = useState({
          nombre: "",
          empresa: "",
          turno: "",
          jornada: ""
        });

        const [chatMessages, setChatMessages] = useState([]);
        const [currentQuestion, setCurrentQuestion] = useState("");
        const [isThinking, setIsThinking] = useState(false);
        const [lastAnswer, setLastAnswer] = useState("");

        const jornadaKey =
          formData.jornada === "SDF" ? "SDF" :
          formData.jornada === "Diario" ? "TT" : null;

        const handleAsk = () => {
          if (!jornadaKey) {
            alert("Selecciona tu jornada.");
            return;
          }
          if (!currentQuestion.trim()) return;

          const q = currentQuestion.trim();
          setCurrentQuestion("");

          setChatMessages((prev) => [...prev, { role: "user", text: q }]);
          setIsThinking(true);

          setTimeout(() => {
            const matches = searchConvenio(q, jornadaKey);
            const answer = buildAnswer(matches, jornadaKey);

            setChatMessages((prev) => [...prev, { role: "assistant", text: answer }]);
            setLastAnswer(answer);
            setIsThinking(false);
          }, 700);
        };

        const exportSummary = () => {
          if (!lastAnswer) return alert("No hay respuesta para exportar.");

          const content =
            `Resumen de consulta\n\n` +
            `Trabajador: ${formData.nombre}\n` +
            `Empresa: ${formData.empresa}\n` +
            `Turno: ${formData.turno}\n` +
            `Jornada: ${formData.jornada}\n\n` +
            lastAnswer;

          const blob = new Blob([content], { type: "text/plain" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "resumen.txt";
          a.click();
          URL.revokeObjectURL(url);
        };

        return (
          <div className="min-h-screen flex flex-col">

            <header className="border-b bg-white">
              <div className="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
                <span className="text-primary font-bold">
                  Convenio LPV Madrid 2026-31
                </span>

                <div className="flex items-center space-x-2">
                  <input
                    type="password"
                    placeholder="Código admin"
                    value={adminCode}
                    onChange={(e) => setAdminCode(e.target.value)}
                    className="border px-2 py-1 text-sm"
                  />
                  <button
                    onClick={() => adminCode === "selur2212@" && setRole("admin")}
                    className="bg-primary text-white px-2 py-1 rounded"
                  >
                    <IconShield />
                  </button>

                  {role !== "guest" && (
                    <button
                      onClick={() => setRole("guest")}
                      className="border px-2 py-1 text-xs rounded flex items-center"
                    >
                      <IconLogout /> <span className="ml-1">Salir</span>
                    </button>
                  )}
                </div>
              </div>
            </header>

            <main className="max-w-6xl mx-auto px-4 py-4 flex-1">

              {/* FORMULARIO */}
              <section className="bg-red-50 border p-4 rounded mb-4">
                <h2 className="text-primary font-bold mb-2">Hola, Compañero!!</h2>

                <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
                  <input
                    type="text"
                    placeholder="Nombre"
                    value={formData.nombre}
                    onChange={(e) => setFormData({ ...formData, nombre: e.target.value })}
                    className="border px-2 py-1"
                  />

                  <select
                    value={formData.empresa}
                    onChange={(e) => setFormData({ ...formData, empresa: e.target.value })}
                    className="border px-2 py-1"
                  >
                    <option value="">Empresa</option>
                    <option>Prezero</option>
                    <option>Urbaser</option>
                    <option>Valoriza</option>
                    <option>FCC</option>
                  </select>

                  <select
                    value={formData.turno}
                    onChange={(e) => setFormData({ ...formData, turno: e.target.value })}
                    className="border px-2 py-1"
                  >
                    <option value="">Turno</option>
                    <option>Mañana</option>
                    <option>Tarde</option>
                    <option>Noche</option>
                  </select>

                  <select
                    value={formData.jornada}
                    onChange={(e) => setFormData({ ...formData, jornada: e.target.value })}
                    className="border px-2 py-1"
                  >
                    <option value="">Jornada</option>
                    <option>Diario</option>
                    <option>SDF</option>
                  </select>
                </div>
              </section>

              {/* CONSULTA */}
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">

                {/* CHAT */}
                <div className="lg:col-span-2 border rounded p-3 flex flex-col h-[480px]">

                  <div className="flex justify-between items-center mb-2">
                    <span className="font-semibold text-primary">Chat de consulta</span>

                    <button
                      onClick={exportSummary}
                      className="border border-primary text-primary px-2 py-1 rounded text-xs flex items-center"
                    >
                      <IconDownload /> <span className="ml-1">Exportar</span>
                    </button>
                  </div>

                  <div className="flex-1 overflow-y-auto space-y-3 text-sm pr-1">
                    {chatMessages.map((m, i) => (
                      <div
                        key={i}
                        className={`flex fade-in ${
                          m.role === "user" ? "justify-end" : "justify-start"
                        }`}
                      >
                        <div className={m.role === "user" ? "bubble-user" : "bubble-ai"}>
                          <div className="whitespace-pre-wrap leading-relaxed">
                            {m.text}
                          </div>
                        </div>
                      </div>
                    ))}

                    {isThinking && (
                      <div className="text-xs text-gray-500 fade-in">
                        ⏳ Analizando documento…
                      </div>
                    )}
                  </div>

                  <textarea
                    value={currentQuestion}
                    onChange={(e) => setCurrentQuestion(e.target.value)}
                    className="chat-input mt-3 text-sm"
                    rows={2}
                    placeholder="Escribe tu pregunta…"
                  ></textarea>

                  <button
                    onClick={handleAsk}
                    className="btn-primary mt-2 text-sm"
                  >
                    Preguntar
                  </button>
                </div>

                {/* CONTEXTO */}
                <div className="border rounded p-3 text-xs bg-gray-50">
                  <h3 className="text-primary font-semibold mb-2">Contexto</h3>
                  <p><b>Nombre:</b> {formData.nombre || "-"}</p>
                  <p><b>Empresa:</b> {formData.empresa || "-"}</p>
                  <p><b>Turno:</b> {formData.turno || "-"}</p>
                  <p><b>Jornada:</b> {formData.jornada || "-"}</p>
                  <p><b>Rol:</b> {role}</p>
                </div>

              </div>
            </main>

            <footer className="text-center text-xs text-gray-500 py-2 border-t">
              Convenio LPV Madrid 2026-31 · Herramienta interna
            </footer>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
