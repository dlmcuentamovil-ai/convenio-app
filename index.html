<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convenio Colectivo LPV Madrid 2026-31</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .chat-message { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-opcion { transition: all 0.2s; }
        .btn-opcion:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-white">
    <div id="app"></div>

    <script>
        // ============================================
        // ÁRBOL DE DECISIÓN CONVERSACIONAL
        // ============================================
        const ARBOL_PREGUNTAS = {
            inicio: {
                pregunta: "¿Qué información necesitas?",
                opciones: [
                    { texto: "📅 Vacaciones", siguiente: "vacaciones" },
                    { texto: "✋ Permisos", siguiente: "permisos_tipo" },
                    { texto: "🏥 Bajas Médicas", siguiente: "bajas" },
                    { texto: "💰 Salarios", siguiente: "salarios" },
                    { texto: "🕐 Horarios", siguiente: "horarios" }
                ]
            },

            // ============ VACACIONES ============
            vacaciones: {
                pregunta: "¿Sobre vacaciones?",
                respuesta: "✅ **VACACIONES**\n\n• Duración: 30 días naturales al año\n• No son acumulables entre años\n• Se disfrutan según calendario de la empresa\n• Requiere acuerdo contigo para cambios\n\n⚠️ Diferencia: Las vacaciones SON PAGADAS y son diferentes de los permisos.",
                siguiente_pregunta: true
            },

            // ============ PERMISOS ============
            permisos_tipo: {
                pregunta: "¿Qué tipo de permiso?",
                opciones: [
                    { texto: "💍 Matrimonio/Pareja", siguiente: "permiso_matrimonio" },
                    { texto: "👶 Nacimiento de hijo", siguiente: "permiso_nacimiento" },
                    { texto: "⚰️ Defunción/Fallecimiento", siguiente: "permiso_defuncion" },
                    { texto: "🏥 Urgencia médica", siguiente: "permiso_medico" },
                    { texto: "📄 Carnet/DNI", siguiente: "permiso_carnet" },
                    { texto: "📋 Asuntos propios", siguiente: "permiso_asuntos" },
                    { texto: "❌ Sin paga (30 días)", siguiente: "permiso_no_retribuido" }
                ]
            },

            permiso_matrimonio: {
                pregunta: "Matrimonio/Pareja de hecho",
                respuesta: "✅ **PERMISO POR MATRIMONIO**\n\n• Duración: 3 días hábiles consecutivos\n• Se pagan: SÍ (permiso retribuido)\n• Aplicable a: Matrimonio legal o pareja de hecho registrada\n• Documentación: Certificado matrimonio o inscripción pareja",
                siguiente_pregunta: true
            },

            permiso_nacimiento: {
                pregunta: "Nacimiento de hijo",
                respuesta: "✅ **PERMISO POR NACIMIENTO**\n\n• Duración: 3 días hábiles consecutivos\n• Se pagan: SÍ (permiso retribuido)\n• Aplicable a: Ambos progenitores (padre y madre)\n• Documentación: Acta de nacimiento",
                siguiente_pregunta: true
            },

            permiso_defuncion: {
                pregunta: "¿Parentesco del fallecido?",
                opciones: [
                    { texto: "💑 Cónyuge/Pareja", siguiente: "defuncion_conyugue" },
                    { texto: "👨‍👩‍👧 Padres/Suegros", siguiente: "defuncion_padres" },
                    { texto: "👫 Hermanos", siguiente: "defuncion_hermanos" },
                    { texto: "👨‍👦 Tíos/Sobrinos", siguiente: "defuncion_otros" }
                ]
            },

            defuncion_conyugue: {
                pregunta: "Fallecimiento de cónyuge/pareja",
                respuesta: "✅ **PERMISO POR FALLECIMIENTO - CÓNYUGE/PAREJA**\n\n• Duración: 3 días hábiles\n• Se pagan: SÍ (permiso retribuido)\n• Aplicable a: Cónyuge o pareja de hecho registrada",
                siguiente_pregunta: true
            },

            defuncion_padres: {
                pregunta: "Fallecimiento de padres/suegros",
                respuesta: "✅ **PERMISO POR FALLECIMIENTO - PADRES/SUEGROS**\n\n• Duración: 2 días hábiles\n• Se pagan: SÍ (permiso retribuido)",
                siguiente_pregunta: true
            },

            defuncion_hermanos: {
                pregunta: "Fallecimiento de hermanos",
                respuesta: "✅ **PERMISO POR FALLECIMIENTO - HERMANOS**\n\n• Duración: 1 día hábil\n• Se pagan: SÍ (permiso retribuido)",
                siguiente_pregunta: true
            },

            defuncion_otros: {
                pregunta: "Fallecimiento de tíos/sobrinos",
                respuesta: "✅ **PERMISO POR FALLECIMIENTO - TÍOS/SOBRINOS**\n\n• Duración: 1 día hábil (2 días si ocurre fuera de provincia)\n• Se pagan: SÍ (permiso retribuido)",
                siguiente_pregunta: true
            },

            permiso_medico: {
                pregunta: "Urgencia médica",
                respuesta: "✅ **PERMISO POR URGENCIA MÉDICA**\n\n• Duración: Tiempo indispensable (no días fijos)\n• Se pagan: SÍ (permiso retribuido)\n• Aplicable a: Cónyuge, pareja de hecho, familiares 1er grado\n• Documentación: Justificante médico obligatorio\n• Aviso: Preavisar cuando sea posible (salvo urgencias)",
                siguiente_pregunta: true
            },

            permiso_carnet: {
                pregunta: "Carnet/DNI",
                respuesta: "✅ **PERMISO PARA CARNET/DNI**\n\n• Duración: Horas estrictamente necesarias\n• Se pagan: SÍ (permiso retribuido)\n• Aplicable a: Exámenes carnet conducir, renovación DNI\n• Documentación: Justificante de la cita",
                siguiente_pregunta: true
            },

            permiso_asuntos: {
                pregunta: "Asuntos propios",
                respuesta: "✅ **PERMISO POR ASUNTOS PROPIOS**\n\n• Duración: 1 día por año\n• Se pagan: SÍ (permiso retribuido)\n• Requisito: Aviso previo cuando sea posible",
                siguiente_pregunta: true
            },

            permiso_no_retribuido: {
                pregunta: "Permisos sin paga",
                respuesta: "✅ **PERMISOS NO RETRIBUIDOS**\n\n• Duración: Hasta 30 días al año\n• Se pagan: NO (sin retribución)\n• Motivos: Familiares, sociales, de estudio, etc.\n• Requisito: Acuerdo previo con la empresa\n\n⚠️ IMPORTANTE: Estos NO se pagan. Diferente de permisos retribuidos.",
                siguiente_pregunta: true
            },

            // ============ BAJAS ============
            bajas: {
                pregunta: "Bajas médicas",
                respuesta: "✅ **BAJAS MÉDICAS / INCAPACIDAD TEMPORAL**\n\n• Primeros 3 días: Empresa paga 60% del salario\n• Desde día 4 en adelante: Mutua paga 75% del salario\n• Requisito: Parte médico oficial necesario\n\n⚠️ DIFERENCIA: Baja ≠ Permiso. La baja es por enfermedad acreditada.",
                siguiente_pregunta: true
            },

            // ============ SALARIOS ============
            salarios: {
                pregunta: "¿Cuál es tu jornada?",
                opciones: [
                    { texto: "📅 Diario (40h/semana)", siguiente: "salarios_diario" },
                    { texto: "🔄 SDF (≤30h/semana)", siguiente: "salarios_sdf" }
                ]
            },

            salarios_diario: {
                pregunta: "Salarios Diario 2026",
                respuesta: "✅ **SALARIOS 2026 - JORNADA DIARIA**\n\n• Peón limpiador: 1.250€/mes\n• Oficial: 1.380€/mes\n• Capataz: 1.520€/mes\n\n**PLUS ESPECIALES (se suman al salario base):**\n• Turno noche (23:00-06:00): +25%\n• Dominical (domingo): +50%\n• Festivo trabajado: +100% (doble)\n• Antigüedad: +2% cada 5 años (máximo 20%)\n\nEjemplo: Peón en turno noche = 1.250 × 1.25 = 1.562,50€",
                siguiente_pregunta: true
            },

            salarios_sdf: {
                pregunta: "Salarios SDF 2026",
                respuesta: "✅ **SALARIOS 2026 - JORNADA SDF (Servicios Discontinuos)**\n\n• Peón limpiador: 950€/mes\n• Oficial: 1.050€/mes\n• Capataz: 1.160€/mes\n\n**GARANTÍAS SDF:**\n• Mínimo 25 días/mes garantizados\n• Máximo 30 horas/semana (media anual)\n• Turnos rotativos\n\n**PLUS ESPECIALES (igual que Diario):**\n• Turno noche: +25%\n• Dominical: +50%\n• Festivo: +100%\n• Antigüedad: +2% cada 5 años\n\n⚠️ SDF gana menos base porque trabaja menos horas garantizadas.",
                siguiente_pregunta: true
            },

            // ============ HORARIOS ============
            horarios: {
                pregunta: "¿Cuál es tu jornada?",
                opciones: [
                    { texto: "📅 Diario (40h/semana)", siguiente: "horarios_diario" },
                    { texto: "🔄 SDF (≤30h/semana)", siguiente: "horarios_sdf" }
                ]
            },

            horarios_diario: {
                pregunta: "Horarios Diario",
                respuesta: "✅ **HORARIOS - JORNADA DIARIA (40h/semana)**\n\n• Turno Mañana: 06:00 - 14:30 (8h 30min)\n• Turno Tarde: 14:30 - 23:00 (8h 30min)\n• Turno Noche: 23:00 - 06:00 (7h)\n\n**DESCANSO:**\n• 2 días consecutivos por semana\n• No cambian sin tu consentimiento (inamovibles por antigüedad)\n\n⚠️ Turno noche paga +25% sobre salario base",
                siguiente_pregunta: true
            },

            horarios_sdf: {
                pregunta: "Horarios SDF",
                respuesta: "✅ **HORARIOS - JORNADA SDF (Servicios Discontinuos)**\n\n• Mañana: 06:00 - 14:30\n• Tarde: 14:30 - 23:00\n• Noche: 23:00 - 06:00\n\n**CARACTERÍSTICAS SDF:**\n• Turnos rotativos (cambias entre mañana, tarde, noche)\n• Máximo 30 horas/semana (media anual)\n• Mínimo 25 días/mes garantizados\n• 2 días descanso consecutivos por semana\n\n⚠️ En SDF los turnos rotan, no son fijos como en Diario",
                siguiente_pregunta: true
            }
        };

        // ============================================
        // ESTADO GLOBAL
        // ============================================
        let appState = {
            isLoggedIn: false,
            role: null,
            worker: { name: '', empresa: '', turno: '', jornada: '' },
            chat: [],
            uploadedFiles: [],
            currentTab: 'consulta',
            nodoPregunta: 'inicio'
        };

        // ============================================
        // FUNCIONES CORE
        // ============================================
        function guardarEstado() {
            localStorage.setItem('convenioState', JSON.stringify({
                worker: appState.worker,
                chat: appState.chat,
                uploadedFiles: appState.uploadedFiles,
                nodoPregunta: appState.nodoPregunta
            }));
        }

        function cargarEstado() {
            const datos = localStorage.getItem('convenioState');
            if (datos) {
                const parsed = JSON.parse(datos);
                appState.worker = parsed.worker || {};
                appState.chat = parsed.chat || [];
                appState.uploadedFiles = parsed.uploadedFiles || [];
                appState.nodoPregunta = parsed.nodoPregunta || 'inicio';
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const nombre = form.querySelector('[name="nombre"]').value;
            const empresa = form.querySelector('[name="empresa"]').value;
            const turno = form.querySelector('[name="turno"]').value;
            const jornada = form.querySelector('[name="jornada"]').value;

            if (nombre && empresa && turno && jornada) {
                appState.worker = { name: nombre, empresa, turno, jornada };
                appState.isLoggedIn = true;
                appState.role = 'worker';
                appState.nodoPregunta = 'inicio';
                appState.chat = [];
                guardarEstado();
                renderApp();
            }
        }

        function handleAdminLogin(codigo) {
            if (codigo === 'selur2212@') {
                appState.isLoggedIn = true;
                appState.role = 'admin';
                appState.worker = { name: 'Administrador', empresa: 'ADMIN', turno: '-', jornada: '-' };
                guardarEstado();
                renderApp();
            } else {
                alert('❌ Código incorrecto');
            }
        }

        function handleLogout() {
            appState.isLoggedIn = false;
            appState.role = null;
            appState.chat = [];
            appState.worker = {};
            appState.nodoPregunta = 'inicio';
            localStorage.removeItem('convenioState');
            renderApp();
        }

        function handleOpcion(siguienteNodo) {
            const nodoActual = ARBOL_PREGUNTAS[appState.nodoPregunta];
            const nodoSiguiente = ARBOL_PREGUNTAS[siguienteNodo];

            // Agregar opción del usuario al chat
            const textoOpcion = event.target.innerText;
            appState.chat.push({
                tipo: 'user',
                contenido: textoOpcion,
                timestamp: new Date()
            });

            // Cambiar nodo
            appState.nodoPregunta = siguienteNodo;

            // Agregar respuesta/pregunta siguiente
            if (nodoSiguiente.respuesta) {
                // Es una respuesta final
                appState.chat.push({
                    tipo: 'assistant',
                    contenido: nodoSiguiente.respuesta,
                    timestamp: new Date()
                });
            } else {
                // Es otra pregunta
                appState.chat.push({
                    tipo: 'assistant',
                    contenido: nodoSiguiente.pregunta,
                    timestamp: new Date()
                });
            }

            guardarEstado();
            renderApp();
        }

        function handleVolver() {
            appState.chat = [];
            appState.nodoPregunta = 'inicio';
            guardarEstado();
            renderApp();
        }

        function handleExportarResumen() {
            let resumen = `=== RESUMEN CONSULTA CONVENIO COLECTIVO ===\nFecha: ${new Date().toLocaleString('es-ES')}\n`;
            resumen += `Trabajador: ${appState.worker.name}\nEmpresa: ${appState.worker.empresa}\nTurno: ${appState.worker.turno}\nJornada: ${appState.worker.jornada}\n\n`;
            resumen += `--- CONVERSACIÓN ---\n`;
            
            appState.chat.forEach(msg => {
                const tipo = msg.tipo === 'user' ? 'TÚ' : 'SISTEMA';
                resumen += `\n[${tipo}]\n${msg.contenido}\n`;
            });

            const blob = new Blob([resumen], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `resumen-convenio-${Date.now()}.txt`;
            a.click();
        }

        function handleFileUpload(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (evt) => {
                    appState.uploadedFiles.push({
                        name: file.name,
                        size: file.size,
                        id: Date.now() + Math.random()
                    });
                    guardarEstado();
                    renderApp();
                };
                reader.readAsText(file);
            });
        }

        function handleDeleteFile(id) {
            appState.uploadedFiles = appState.uploadedFiles.filter(f => f.id !== id);
            guardarEstado();
            renderApp();
        }

        // ============================================
        // RENDERIZADO
        // ============================================
        function renderLogin() {
            return `
            <div class="min-h-screen bg-gradient-to-b from-red-50 to-white flex items-center justify-center p-4">
                <div class="w-full max-w-md">
                    <div class="bg-white rounded-lg shadow-xl p-8">
                        <div class="text-center mb-8">
                            <div class="text-6xl font-bold text-red-600 mb-2">UGT</div>
                            <h1 class="text-2xl font-bold text-gray-800">Convenio Colectivo</h1>
                            <p class="text-sm text-gray-600 mt-2">LPV de Madrid Capital 2026-31</p>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-gray-50 p-6 rounded-lg">
                                <h2 class="text-lg font-bold text-gray-800 mb-4">¡Hola, Compañero!!</h2>
                                <form id="loginForm">
                                    <div class="mb-4">
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Nombre</label>
                                        <input type="text" name="nombre" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500">
                                    </div>
                                    <div class="mb-4">
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Empresa</label>
                                        <select name="empresa" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500">
                                            <option value="">Selecciona...</option>
                                            <option value="Prezero">Prezero</option>
                                            <option value="Urbaser">Urbaser</option>
                                            <option value="Valoriza">Valoriza</option>
                                            <option value="FCC">FCC</option>
                                        </select>
                                    </div>
                                    <div class="mb-4">
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Turno</label>
                                        <select name="turno" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500">
                                            <option value="">Selecciona...</option>
                                            <option value="Mañana">Mañana</option>
                                            <option value="Tarde">Tarde</option>
                                            <option value="Noche">Noche</option>
                                        </select>
                                    </div>
                                    <div class="mb-6">
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Jornada</label>
                                        <select name="jornada" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500">
                                            <option value="">Selecciona...</option>
                                            <option value="Diario">Diario</option>
                                            <option value="SDF">SDF</option>
                                        </select>
                                    </div>
                                    <button type="submit" class="w-full bg-red-600 text-white font-bold py-2 rounded-lg hover:bg-red-700">Acceder</button>
                                </form>
                            </div>

                            <div class="border-t pt-6">
                                <p class="text-xs text-gray-500 mb-2">Administrador</p>
                                <div class="flex gap-2">
                                    <input type="password" id="adminCode" placeholder="Código..." class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 text-sm">
                                    <button onclick="window.handleAdminLogin(document.getElementById('adminCode').value)" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">🛡️</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        function renderApp() {
            const root = document.getElementById('app');

            if (!appState.isLoggedIn) {
                root.innerHTML = renderLogin();
                document.getElementById('loginForm')?.addEventListener('submit', handleLogin);
                return;
            }

            let contenido = appState.currentTab === 'consulta' ? renderConsulta() : renderDocumentacion();

            root.innerHTML = `
            <div class="flex flex-col h-screen bg-white">
                <header class="bg-red-600 text-white px-6 py-4 shadow-lg flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="text-4xl font-bold">UGT</div>
                        <div>
                            <h1 class="text-lg font-bold">Convenio Colectivo LPV de Madrid Capital 2026-31</h1>
                            <p class="text-xs text-red-100">${appState.role === 'admin' ? '👤 Admin' : '👷 ' + appState.worker.name}</p>
                        </div>
                    </div>
                    <button onclick="window.handleLogout()" class="bg-red-700 hover:bg-red-800 px-4 py-2 rounded-lg text-sm font-medium">Desloguear</button>
                </header>

                <div class="bg-gray-100 border-b border-gray-300 flex">
                    <button onclick="(() => { appState.currentTab = 'consulta'; window.renderApp(); })()" class="px-6 py-3 font-medium ${appState.currentTab === 'consulta' ? 'border-b-4 border-red-600 text-red-600' : 'text-gray-600'} hover:bg-gray-200">
                        💬 Consulta
                    </button>
                    ${appState.role === 'admin' ? `<button onclick="(() => { appState.currentTab = 'documentacion'; window.renderApp(); })()" class="px-6 py-3 font-medium ${appState.currentTab === 'documentacion' ? 'border-b-4 border-red-600 text-red-600' : 'text-gray-600'} hover:bg-gray-200">
                        📄 Documentación
                    </button>` : ''}
                </div>

                <div class="flex-1 overflow-auto">
                    ${contenido}
                </div>
            </div>
            `;
        }

        function renderConsulta() {
            const nodoActual = ARBOL_PREGUNTAS[appState.nodoPregunta];

            return `
            <div class="flex flex-col h-full">
                <div class="flex-1 overflow-auto p-6 space-y-4 bg-gray-50">
                    ${appState.chat.length === 0 ? `
                        <div class="text-center py-12">
                            <p class="text-gray-700 text-lg font-medium">Bienvenido, ${appState.worker.name}</p>
                            <p class="text-gray-500 text-sm mt-2">Vamos a guiarte hacia la respuesta exacta</p>
                        </div>
                    ` : ''}
                    
                    ${appState.chat.map(msg => `
                        <div class="chat-message ${msg.tipo === 'user' ? 'flex justify-end' : 'flex justify-start'}">
                            <div class="max-w-2xl ${msg.tipo === 'user' ? 'bg-red-600 text-white' : 'bg-white border border-gray-300'} rounded-lg p-4 text-sm">
                                ${msg.contenido.split('\n').map(line => `<p>${line}</p>`).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div class="bg-white border-t border-gray-300 p-4">
                    <div class="mb-4">
                        <p class="font-bold text-gray-800 mb-3">${nodoActual.pregunta}</p>
                        <div class="grid grid-cols-1 gap-2">
                            ${nodoActual.opciones ? nodoActual.opciones.map(opcion => `
                                <button onclick="window.handleOpcion('${opcion.siguiente}')" class="btn-opcion bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded-lg text-left font-medium">
                                    ${opcion.texto}
                                </button>
                            `).join('') : ''}
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="window.handleVolver()" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 py-2 px-4 rounded-lg font-medium text-sm">↩️ Volver al inicio</button>
                        ${appState.chat.length > 2 ? `<button onclick="window.handleExportarResumen()" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded-lg font-medium text-sm">📥 Exportar</button>` : ''}
                    </div>
                </div>
            </div>
            `;
        }

        function renderDocumentacion() {
            return `
            <div class="p-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">📄 Documentos</h2>
                <div class="bg-red-50 border-2 border-dashed border-red-300 rounded-lg p-8 text-center mb-8 cursor-pointer hover:bg-red-100" onclick="document.getElementById('fileInput').click()">
                    <p class="text-gray-700 font-medium">Arrastra o haz clic</p>
                    <p class="text-gray-600 text-sm mt-2">.md, .pdf, .txt</p>
                    <input type="file" id="fileInput" multiple accept=".md,.pdf,.txt" class="hidden" onchange="window.handleFileUpload(event)">
                </div>

                <div class="space-y-3">
                    ${appState.uploadedFiles.length === 0 ? `<p class="text-gray-400 text-center py-8">Sin archivos</p>` : appState.uploadedFiles.map(file => `
                        <div class="bg-gray-100 p-4 rounded-lg flex justify-between items-center">
                            <div>
                                <p class="font-medium text-gray-800">${file.name}</p>
                                <p class="text-xs text-gray-600">${(file.size / 1024).toFixed(2)} KB</p>
                            </div>
                            <button onclick="window.handleDeleteFile(${file.id})" class="bg-red-600 text-white px-3 py-1 rounded text-sm hover:bg-red-700">Eliminar</button>
                        </div>
                    `).join('')}
                </div>
            </div>
            `;
        }

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            cargarEstado();
            renderApp();
        });

        window.handleLogin = handleLogin;
        window.handleAdminLogin = handleAdminLogin;
        window.handleLogout = handleLogout;
        window.handleOpcion = handleOpcion;
        window.handleVolver = handleVolver;
        window.handleExportarResumen = handleExportarResumen;
        window.handleFileUpload = handleFileUpload;
        window.handleDeleteFile = handleDeleteFile;
        window.renderApp = renderApp;
    </script>
</body>
</html>
