<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Convenio LPV - Editor</title>

  <style>
/* ESTILO MODERNO Y PROFESIONAL */

body {
  font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Arial;
  margin: 0;
  padding: 20px;
  background: #fff5f5;
  color: #222;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

h1 {
  margin: 0;
  font-size: 22px;
  color: #c40000;
  font-weight: 700;
}

.role-badge {
  padding: 6px 12px;
  background: #eee;
  border-radius: 8px;
  font-size: 14px;
}

.logout-btn {
  background: #444;
  padding: 6px 10px;
  border-radius: 6px;
  color: #fff;
  border: none;
  cursor: pointer;
}

.shield {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: #fff;
  border: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(0,0,0,.08);
  transition: 0.15s;
}

.shield:hover {
  transform: translateY(-2px);
}

.admin-panel {
  display: none;
  position: absolute;
  right: 0;
  top: 50px;
  background: #fff;
  padding: 14px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,.15);
  min-width: 240px;
  z-index: 999;
  flex-direction: column;
  gap: 10px;
}

label {
  font-weight: 600;
  margin-top: 12px;
}

textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 15px;
  background: #fff;
}

button {
  background: #c40000;
  color: #fff;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.15s;
}

button:hover {
  background: #a00000;
}

button.secondary {
  background: #666;
}

.images-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 12px;
}

.img-wrap {
  position: relative;
  border: 1px solid #eee;
  padding: 6px;
  border-radius: 8px;
  background: #fafafa;
}

.img-wrap img {
  width: 100%;
  height: 80px;
  object-fit: cover;
  border-radius: 6px;
}

.img-remove {
  position: absolute;
  top: 6px;
  right: 6px;
  background: #0008;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 2px 6px;
  cursor: pointer;
}
</head>

<body>

<header style="position:relative;">
  <div style="display:flex; align-items:center; gap:10px;">
    <div style="font-size:28px">📚</div>
    <h1>Convenio LPV</h1>
  </div>

  <div style="display:flex; align-items:center; gap:10px;">
    <div class="role-badge">Rol: <span id="roleText">usuario</span></div>
    <button id="logoutBtn" class="logout-btn" style="display:none">Salir Admin</button>

    <div style="position:relative;">
      <div class="shield" id="shieldBtn">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M12 2L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-3z" fill="#c40000"/>
          <circle cx="12" cy="12" r="3.5" fill="#fff"/>
        </svg>
      </div>

      <div id="adminPanel" class="admin-panel">
        <strong style="color:#c40000;">Acceso Admin</strong>
        <input id="adminCode" type="password" placeholder="Introduce código">
        <button id="adminEnter">Entrar</button>
        <button id="adminCancel" class="secondary">Cerrar</button>
      </div>
    </div>
  </div>
</header>

<main id="appRoot"></main>

<script src="config.js"></script>
<script src="respuestas.js"></script>

<script>
(function(){

  const $ = s => document.querySelector(s);

  let estado = {
    categoria:"",
    sub:"",
    role: sessionStorage.getItem("role") || "user"
  };

  const shieldBtn = $("#shieldBtn");
  const adminPanel = $("#adminPanel");
  const adminCode = $("#adminCode");
  const adminEnter = $("#adminEnter");
  const adminCancel = $("#adminCancel");
  const roleText = $("#roleText");
  const logoutBtn = $("#logoutBtn");

  function setRoleUI(){
    roleText.textContent = estado.role === "admin" ? "admin" : "usuario";
    logoutBtn.style.display = estado.role === "admin" ? "inline-block" : "none";
  }

  shieldBtn.addEventListener("click", ()=>{
    adminPanel.style.display = adminPanel.style.display === "flex" ? "none" : "flex";
    adminPanel.style.flexDirection = "column";
    adminCode.focus();
  });

  adminCancel.addEventListener("click", ()=>{
    adminPanel.style.display = "none";
  });

  adminEnter.addEventListener("click", ()=>{
    if(adminCode.value === "Selur2212@"){
      estado.role = "admin";
      sessionStorage.setItem("role","admin");
      adminPanel.style.display = "none";
      adminCode.value = "";
      setRoleUI();
      renderApp();
      alert("Acceso admin concedido");
    } else {
      alert("Código incorrecto");
    }
  });

  logoutBtn.addEventListener("click", ()=>{
    estado.role = "user";
    sessionStorage.setItem("role","user");
    setRoleUI();
    renderApp();
  });

  function renderApp(){
    const root = $("#appRoot");
    root.innerHTML = "";

    // Selects
    const labelCat = document.createElement("label");
    labelCat.textContent = "Categoría";
    const selectCat = document.createElement("select");
    selectCat.innerHTML = "<option value=''>-- Selecciona categoría --</option>";
    Object.keys(window.RESPUESTAS).forEach(cat=>{
      const o = document.createElement("option");
      o.value = cat; o.textContent = cat;
      selectCat.appendChild(o);
    });
    labelCat.appendChild(selectCat);
    root.appendChild(labelCat);

    const labelSub = document.createElement("label");
    labelSub.textContent = "Subcategoría";
    const selectSub = document.createElement("select");
    selectSub.innerHTML = "<option value=''>-- Selecciona sub --</option>";
    labelSub.appendChild(selectSub);
    root.appendChild(labelSub);

    // Editor (solo admin)
    const editor = document.createElement("div");
    editor.id = "editorArea";
    editor.style.marginTop = "20px";
    editor.style.display = estado.role === "admin" ? "" : "none";

    const lblDiario = document.createElement("label");
    lblDiario.textContent = "Diario (editar)";
    const taDiario = document.createElement("textarea");
    taDiario.id = "taDiario";
    lblDiario.appendChild(taDiario);

    const lblSdf = document.createElement("label");
    lblSdf.textContent = "SDF (editar)";
    const taSdf = document.createElement("textarea");
    taSdf.id = "taSdf";
    lblSdf.appendChild(taSdf);

    editor.appendChild(lblDiario);
    editor.appendChild(lblSdf);

    // Botones admin
    const btns = document.createElement("div");
    btns.className = "buttons";
    const btnGuardar = document.createElement("button");
    btnGuardar.textContent = "Guardar";
    const btnGuardarTodo = document.createElement("button");
    btnGuardarTodo.textContent = "Guardar TODO";
    btnGuardarTodo.className = "secondary";
    btns.appendChild(btnGuardar);
    btns.appendChild(btnGuardarTodo);
    editor.appendChild(btns);

    root.appendChild(editor);

    // Eventos selects
    selectCat.addEventListener("change", ()=>{
      estado.categoria = selectCat.value;
      estado.sub = "";
      selectSub.innerHTML = "<option value=''>-- Selecciona sub --</option>";
      if(estado.categoria){
        Object.keys(window.RESPUESTAS[estado.categoria]).forEach(s=>{
          const o = document.createElement("option");
          o.value = s; o.textContent = s;
          selectSub.appendChild(o);
        });
      }
      limpiarEditor();
    });

    selectSub.addEventListener("change", ()=>{
      estado.sub = selectSub.value;
      cargarNodo();
    });

    function limpiarEditor(){
      taDiario.value = "";
      taSdf.value = "";
      lblDiario.style.display = "none";
      lblSdf.style.display = "none";
    }

    function cargarNodo(){
      limpiarEditor();
      if(estado.role !== "admin") return;
      if(!estado.categoria || !estado.sub) return;

      const nodo = window.RESPUESTAS[estado.categoria][estado.sub];
      if(!nodo) return;

      if(nodo.diario !== undefined){
        lblDiario.style.display = "";
        taDiario.value = nodo.diario;
      }

      if(nodo.sdf !== undefined){
        lblSdf.style.display = "";
        taSdf.value = nodo.sdf;
      }
    }

    btnGuardar.addEventListener("click", ()=>{
      if(!estado.categoria || !estado.sub) return;
      const nodo = window.RESPUESTAS[estado.categoria][estado.sub];
      if(nodo.diario !== undefined) nodo.diario = taDiario.value;
      if(nodo.sdf !== undefined) nodo.sdf = taSdf.value;
      alert("Guardado en memoria");
    });

    btnGuardarTodo.addEventListener("click", ()=>{
      localStorage.setItem("RESPUESTAS", JSON.stringify(window.RESPUESTAS));
      alert("Guardado TODO");
    });

  }

  setRoleUI();
  renderApp();

})();
</script>

</body>
</html>
