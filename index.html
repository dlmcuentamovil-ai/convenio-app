<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Convenio LPV - Editor</title>

<style>
/* ------------------------------
   ESTILO GLOBAL
------------------------------ */
body {
  font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Arial;
  margin: 0;
  padding: 20px;
  background: #fff5f5;
  color: #222;
  display: block;              /* ← CORRECCIÓN: evita que header y appRoot se separen */
  text-align: center;
}

/* Contenedor principal tipo app */
#appRoot {
  max-width: 320px;            /* ancho ideal móvil */
  width: 100%;
  margin: 0 auto;
  text-align: center;
}

/* ------------------------------
   HEADER
------------------------------ */
header {
  max-width: 320px;
  width: 100%;
  margin: 0 auto 20px auto;
  text-align: center;
  display: flex;
  flex-direction: column;      /* ← centra verticalmente */
  align-items: center;         /* ← centra horizontalmente */
  gap: 8px;
}

header > div {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

h1 {
  margin: 0;
  font-size: 22px;
  color: #c40000;
  font-weight: 700;
}

.role-badge {
  padding: 6px 12px;
  background: #eee;
  border-radius: 8px;
  font-size: 14px;
}

.logout-btn {
  background: #444;
  padding: 6px 10px;
  border-radius: 6px;
  color: #fff;
  border: none;
  cursor: pointer;
}

/* Escudo admin */
.shield {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: #fff;
  border: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(0,0,0,.08);
  transition: 0.15s;
}

.shield:hover {
  transform: translateY(-2px);
}

/* Panel admin */
.admin-panel {
  display: none;
  position: absolute;
  right: 0;
  top: 50px;
  background: #fff;
  padding: 14px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,.15);
  min-width: 240px;
  z-index: 999;
  flex-direction: column;
  gap: 10px;
}

/* ------------------------------
   FORMULARIOS Y CAMPOS
------------------------------ */
label {
  font-weight: 600;
  margin-top: 12px;
  display: block;
  text-align: left;
  font-size: 14px;
  max-width: 260px;
  margin-left: auto;
  margin-right: auto;
}

input, select, textarea {
  width: 100%;
  max-width: 260px;            /* ← evita solapamientos */
  margin: 0 auto;
  display: block;
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  background: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,.05);
}

textarea {
  font-size: 15px;
  padding: 10px;
}

/* ------------------------------
   BOTONES
------------------------------ */
button {
  background: #c40000;
  color: #fff;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.15s;
  margin: 12px auto 0 auto;
  display: block;
  width: 100%;
  max-width: 260px;            /* ← evita que el botón se solape */
}

button:hover {
  background: #a00000;
}

button.secondary {
  background: #666;
}

/* ------------------------------
   GRID DE IMÁGENES
------------------------------ */
.images-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* mejor para móvil */
  gap: 10px;
  margin-top: 12px;
  justify-content: center;
}

.img-wrap {
  position: relative;
  border: 1px solid #eee;
  padding: 6px;
  border-radius: 8px;
  background: #fafafa;
  box-shadow: 0 2px 6px rgba(0,0,0,.05);
}

.img-wrap img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 6px;
}

.img-remove {
  position: absolute;
  top: 6px;
  right: 6px;
  background: #0008;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 2px 6px;
  cursor: pointer;
}

/* ------------------------------
   TITULOS
------------------------------ */
h2 {
  text-align: center;
  font-size: 20px;
  color: #c40000;
  margin-bottom: 10px;
}

/* ------------------------------
   RESPONSIVE EXTRA
------------------------------ */
@media (max-width: 400px) {
  #appRoot, header {
    max-width: 90%;
  }

  input, select, button, textarea {
    max-width: 100%;
  }

  .images-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
#inpJornada {
  margin-bottom: 18px !important;   /* separa Jornada del botón */
}
</style>
</head>

<body>

<header style="position:relative;">
  <div style="display:flex; align-items:center; gap:10px;">
    <div style="font-size:28px">📚</div>
    <h1>Convenio LPV</h1>
  </div>

  <div style="display:flex; align-items:center; gap:10px;">
    <div class="role-badge">Rol: <span id="roleText">usuario</span></div>
    <button id="logoutBtn" class="logout-btn" style="display:none">Salir Admin</button>

    <div style="position:relative;">
      <div class="shield" id="shieldBtn">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M12 2L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-3z" fill="#c40000"/>
          <circle cx="12" cy="12" r="3.5" fill="#fff"/>
        </svg>
      </div>

      <div id="adminPanel" class="admin-panel">
        <strong style="color:#c40000;">Acceso Admin</strong>
        <input id="adminCode" type="password" placeholder="Introduce código">
        <button id="adminEnter">Entrar</button>
        <button id="adminCancel" class="secondary">Cerrar</button>
      </div>
    </div>
  </div>
</header>

<main id="appRoot"></main>
<script src="estructura.js"></script>
<script src="respuestas.js"></script>
<script src="config.js"></script>

<script>
(() => {

  /* ------------------------------------------------
        CARGAR RESPUESTAS DESDE LOCALSTORAGE
  -------------------------------------------------- */
  const savedResp = localStorage.getItem("RESPUESTAS");
  if (savedResp) {
    try {
      window.RESPUESTAS = JSON.parse(savedResp);
    } catch (e) {
      console.error("Error al leer RESPUESTAS guardadas", e);
    }
  }

  /* ------------------------------------------------
        VARIABLES GLOBALES
  -------------------------------------------------- */
  const $ = sel => document.querySelector(sel);

  const estado = {
    role: "usuario",
    nombre: "",
    selur: "",
    jornada: "",
    tipo: "",
    categoria: "",
    sub: ""
  };

  /* ------------------------------------------------
        GESTIÓN DEL ROL ADMIN
  -------------------------------------------------- */
  const shieldBtn = $("#shieldBtn");
  const adminPanel = $("#adminPanel");
  const adminEnter = $("#adminEnter");
  const adminCancel = $("#adminCancel");
  const adminCode = $("#adminCode");
  const logoutBtn = $("#logoutBtn");
  const roleText = $("#roleText");

  shieldBtn.addEventListener("click", () => {
    adminPanel.style.display = "flex";
  });

  adminCancel.addEventListener("click", () => {
    adminPanel.style.display = "none";
    adminCode.value = "";
  });

  adminEnter.addEventListener("click", () => {
    if (adminCode.value.trim() === "Selur2212@") {
      estado.role = "admin";
      adminPanel.style.display = "none";
      adminCode.value = "";
      setRoleUI();
      renderApp();
    } else {
      alert("Código incorrecto");
    }
  });

  logoutBtn.addEventListener("click", () => {
    estado.role = "usuario";
    estado.tipo = "";
    estado.categoria = "";
    estado.sub = "";
    setRoleUI();
    renderApp();
  });

  /* ------------------------------------------------
        ACTUALIZAR UI SEGÚN ROL
  -------------------------------------------------- */
  function setRoleUI() {
    roleText.textContent = estado.role;
    logoutBtn.style.display = estado.role === "admin" ? "inline-block" : "none";
  }

  /* ------------------------------------------------
        FUNCIÓN PRINCIPAL: renderApp()
  -------------------------------------------------- */
  function renderApp() {
    const root = $("#appRoot");
    root.innerHTML = "";

    /* ADMIN SIN TIPO SELECCIONADO */
    if (estado.role === "admin" && !estado.tipo) {
      root.innerHTML = `
        <h2 style="color:#c40000;">Selecciona una opción</h2>
        <div style="display:flex; gap:20px; margin-top:20px;">
          <button id="btnConvenio" style="flex:1; padding:20px; font-size:18px;">Convenio</button>
          <button id="btnSelur" style="flex:1; padding:20px; font-size:18px;">Acuerdo Selur</button>
        </div>
      `;

      $("#btnConvenio").addEventListener("click", () => {
        estado.tipo = "convenio";
        renderApp();
      });

      $("#btnSelur").addEventListener("click", () => {
        alert("Aún no has pasado las categorías de Acuerdo Selur");
      });

      return;
    }

    /* FORMULARIO USUARIO */
    if (estado.role !== "admin" && (!estado.nombre || !estado.selur || !estado.jornada)) {
      root.innerHTML = `
        <h2 style="color:#c40000;">Datos del trabajador</h2>

        <label>Nombre</label>
        <input id="inpNombre" type="text" placeholder="Tu nombre">

        <label>¿Eres del Selur básico o pintadas?</label>
        <select id="inpSelur">
          <option value="">Selecciona...</option>
          <option value="basico">Básico</option>
          <option value="pintadas">Pintadas</option>
        </select>

        <label>Jornada</label>
        <select id="inpJornada">
          <option value="">Selecciona...</option>
        </select>

        <button id="btnForm" style="margin-top:15px;">Entrar</button>
      `;

      $("#inpSelur").addEventListener("change", () => {
        const j = $("#inpJornada");
        j.innerHTML = "";

        if ($("#inpSelur").value === "basico") {
          j.innerHTML = `
            <option value="">Selecciona...</option>
            <option value="cuadrante">Por cuadrante</option>
            <option value="parcial">Parcial</option>
          `;
        }

        if ($("#inpSelur").value === "pintadas") {
          j.innerHTML = `
            <option value="">Selecciona...</option>
            <option value="completa">Jornada completa</option>
            <option value="sdf">SDF</option>
          `;
        }
      });

      $("#btnForm").addEventListener("click", () => {
        estado.nombre = $("#inpNombre").value.trim();
        estado.selur = $("#inpSelur").value;
        estado.jornada = $("#inpJornada").value;

        if (!estado.nombre || !estado.selur || !estado.jornada) {
          alert("Completa todos los campos");
          return;
        }

        renderApp();
      });

      return;
    }

    /* SELECCIÓN CONVENIO / SELUR */
    if (!estado.tipo) {
      root.innerHTML = `
        <h2 style="color:#c40000;">Selecciona una opción</h2>
        <div style="display:flex; gap:20px; margin-top:20px;">
          <button id="btnConvenio" style="flex:1; padding:20px;">Convenio</button>
          <button id="btnSelur" style="flex:1; padding:20px;">Acuerdo Selur</button>
        </div>
      `;

      $("#btnConvenio").addEventListener("click", () => {
        estado.tipo = "convenio";
        renderApp();
      });

      $("#btnSelur").addEventListener("click", () => {
        alert("Aún no has pasado las categorías de Acuerdo Selur");
      });

      return;
    }

    /* BUSCADOR + CATEGORÍAS */
    if (estado.tipo === "convenio" && !estado.categoria) {
      const titulo = document.createElement("h2");
      titulo.textContent = "¿Qué quieres consultar?";
      titulo.style.color = "#c40000";
      root.appendChild(titulo);

      const buscador = document.createElement("input");
      buscador.type = "text";
      buscador.placeholder = "Buscar en el Convenio...";
      buscador.style.padding = "10px";
      buscador.style.width = "100%";
      buscador.style.marginBottom = "15px";
      root.appendChild(buscador);

      buscador.addEventListener("input", () => {
        renderResultadosBusqueda(buscador.value.toLowerCase());
      });

      const grid = document.createElement("div");
      grid.style.display = "grid";
      grid.style.gridTemplateColumns = "repeat(2, 1fr)";
      grid.style.gap = "12px";

      Object.keys(window.ESTRUCTURA).forEach(cat => {
        const c = window.ESTRUCTURA[cat];

        const card = document.createElement("div");
        card.style.padding = "20px";
        card.style.background = "#fff";
        card.style.borderRadius = "10px";
        card.style.boxShadow = "0 4px 12px rgba(0,0,0,.08)";
        card.style.cursor = "pointer";
        card.style.textAlign = "center";

        card.innerHTML = `
          <div style="font-size:32px;">${c.icono}</div>
          <div style="margin-top:8px; font-weight:600;">${c.titulo}</div>
        `;

        card.addEventListener("click", () => {
          estado.categoria = cat;
          renderSubcategorias();
        });

        grid.appendChild(card);
      });

      root.appendChild(grid);
      return;
    }

    /* NUEVO: CONTROL DE ESTADOS FINALES */
    if (estado.categoria && !estado.sub) {
      renderSubcategorias();
      return;
    }

    if (estado.categoria && estado.sub) {
      renderContenido();
      return;
    }
  }

  /* ------------------------------------------------
        SUBCATEGORÍAS
  -------------------------------------------------- */
  function renderSubcategorias() {
    const root = $("#appRoot");
    root.innerHTML = "";

    const cat = window.ESTRUCTURA[estado.categoria];

    const titulo = document.createElement("h2");
    titulo.textContent = cat.titulo;
    titulo.style.color = "#c40000";
    root.appendChild(titulo);

    const btnBack = document.createElement("button");
    btnBack.textContent = "← Volver";
    btnBack.style.marginBottom = "15px";
    btnBack.addEventListener("click", () => {
      estado.categoria = "";
      renderApp();
    });
    root.appendChild(btnBack);

    if (window.RESPUESTAS[estado.categoria].imagenes.length > 0 && estado.role !== "admin") {
      const grid = document.createElement("div");
      grid.className = "images-grid";

      window.RESPUESTAS[estado.categoria].imagenes.forEach(img => {
        const wrap = document.createElement("div");
        wrap.className = "img-wrap";

        const image = document.createElement("img");
        image.src = img;

        wrap.appendChild(image);
        grid.appendChild(wrap);
      });

      root.appendChild(grid);
    }

    if (estado.role === "admin") {
      const btnImgs = document.createElement("button");
      btnImgs.textContent = "🖼️ Imágenes de la categoría";
      btnImgs.style.marginBottom = "15px";
      btnImgs.addEventListener("click", () => {
        renderImagenesCategoria();
      });
      root.appendChild(btnImgs);
    }

    const grid = document.createElement("div");
    grid.style.display = "grid";
    grid.style.gridTemplateColumns = "repeat(2, 1fr)";
    grid.style.gap = "12px";

    Object.keys(cat.sub).forEach(sub => {
      const s = cat.sub[sub];

      const card = document.createElement("div");
      card.style.padding = "20px";
      card.style.background = "#fff";
      card.style.borderRadius = "10px";
      card.style.boxShadow = "0 4px 12px rgba(0,0,0,.08)";
      card.style.cursor = "pointer";
      card.style.textAlign = "center";

      card.textContent = s.titulo;

      card.addEventListener("click", () => {
        estado.sub = sub;
        renderContenido();
      });

      grid.appendChild(card);
    });

    root.appendChild(grid);
  }

  /* ------------------------------------------------
        CONTENIDO / EDITOR
  -------------------------------------------------- */
  function renderContenido() {
    const root = $("#appRoot");
    root.innerHTML = "";

    const titulo = document.createElement("h2");
    titulo.textContent = window.ESTRUCTURA[estado.categoria].sub[estado.sub].titulo;
    titulo.style.color = "#c40000";
    root.appendChild(titulo);

    const btnBack = document.createElement("button");
    btnBack.textContent = "← Volver";
    btnBack.style.marginBottom = "15px";
    btnBack.addEventListener("click", () => {
      estado.sub = "";
      renderSubcategorias();
    });
    root.appendChild(btnBack);

    const nodo = window.RESPUESTAS[estado.categoria][estado.sub];

    if (estado.role === "admin") {
      root.innerHTML += `
        <label>Texto Diario</label>
        <textarea id="txtDiario" rows="6">${nodo.diario}</textarea>

        <label>Texto SDF</label>
        <textarea id="txtSdf" rows="6">${nodo.sdf}</textarea>

        <button id="btnSave" style="margin-top:20px;">Guardar</button>
      `;

      $("#btnSave").addEventListener("click", () => {
        nodo.diario = $("#txtDiario").value;
        nodo.sdf = $("#txtSdf").value;

        localStorage.setItem("RESPUESTAS", JSON.stringify(window.RESPUESTAS));
        alert("Guardado");
      });

    } else {
      const texto = estado.jornada === "diario" ? nodo.diario : nodo.sdf;
      root.innerHTML += `
        <div style="background:#fff; padding:20px; border-radius:10px; box-shadow:0 4px 12px rgba(0,0,0,.08);">
          ${texto || "<i>No hay contenido disponible</i>"}
        </div>
      `;
    }
  }

  /* ------------------------------------------------
        EDITOR DE IMÁGENES POR CATEGORÍA
  -------------------------------------------------- */
  function renderImagenesCategoria() {
    const root = $("#appRoot");
    root.innerHTML = "";

    const cat = estado.categoria;
    const nodo = window.RESPUESTAS[cat];

    const titulo = document.createElement("h2");
    titulo.textContent = "Imágenes de " + window.ESTRUCTURA[cat].titulo;
    titulo.style.color = "#c40000";
    root.appendChild(titulo);

    const btnBack = document.createElement("button");
    btnBack.textContent = "← Volver";
    btnBack.style.marginBottom = "15px";
    btnBack.addEventListener("click", () => renderSubcategorias());
    root.appendChild(btnBack);

    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.multiple = true;
    input.style.marginBottom = "15px";
    root.appendChild(input);

    input.addEventListener("change", e => {
      [...e.target.files].forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          nodo.imagenes.push(ev.target.result);
          renderImagenesCategoria();
        };
        reader.readAsDataURL(file);
      });
    });

    const grid = document.createElement("div");
    grid.className = "images-grid";

    nodo.imagenes.forEach((img, i) => {
      const wrap = document.createElement("div");
      wrap.className = "img-wrap";

      const image = document.createElement("img");
      image.src = img;

      const del = document.createElement("button");
      del.className = "img-remove";
      del.textContent = "X";
      del.addEventListener("click", () => {
        nodo.imagenes.splice(i, 1);
        renderImagenesCategoria();
      });

      wrap.appendChild(image);
      wrap.appendChild(del);
      grid.appendChild(wrap);
    });

    root.appendChild(grid);

    const btnSave = document.createElement("button");
    btnSave.textContent = "Guardar TODO";
    btnSave.style.marginTop = "20px";
    btnSave.addEventListener("click", () => {
      localStorage.setItem("RESPUESTAS", JSON.stringify(window.RESPUESTAS));
      alert("Guardado");
    });

    root.appendChild(btnSave);
  }

  /* ------------------------------------------------
        BUSCADOR INTELIGENTE
  -------------------------------------------------- */
  function renderResultadosBusqueda(q) {
    const root = $("#appRoot");
    root.innerHTML = "";

    const titulo = document.createElement("h2");
    titulo.textContent = "Resultados de búsqueda";
    titulo.style.color = "#c40000";
    root.appendChild(titulo);

    const btnBack = document.createElement("button");
    btnBack.textContent = "← Volver";
    btnBack.style.marginBottom = "15px";
    btnBack.addEventListener("click", () => {
      estado.categoria = "";
      renderApp();
    });
    root.appendChild(btnBack);

    const lista = document.createElement("div");
    lista.style.display = "flex";
    lista.style.flexDirection = "column";
    lista.style.gap = "10px";

    Object.keys(window.RESPUESTAS).forEach(cat => {
      Object.keys(window.RESPUESTAS[cat]).forEach(sub => {
        if (sub === "imagenes") return;

        const nodo = window.RESPUESTAS[cat][sub];
        const texto = (nodo.diario + " " + nodo.sdf).toLowerCase();

        if (texto.includes(q)) {
          const item = document.createElement("div");
          item.style.padding = "10px";
          item.style.border = "1px solid #ddd";
          item.style.borderRadius = "8px";
          item.style.cursor = "pointer";
          item.style.background = "#fff";

          item.textContent =
            window.ESTRUCTURA[cat].titulo +
            " → " +
            window.ESTRUCTURA[cat].sub[sub].titulo;

          item.addEventListener("click", () => {
            estado.categoria = cat;
            estado.sub = sub;
            renderContenido();
          });

          lista.appendChild(item);
        }
      });
    });

    if (lista.children.length === 0) {
      lista.innerHTML = "<p>No se encontraron resultados.</p>";
    }

    root.appendChild(lista);
  }

  /* ------------------------------------------------
        INICIALIZACIÓN
  -------------------------------------------------- */
  setRoleUI();
  renderApp();

})();
</script>

</body>
</html>
