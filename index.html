<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta Convenio Selur</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
<meta name="theme-color" content="#000000" />
  <!-- Archivos externos -->
  <script src="estructura.js"></script>
  <script src="respuestas_basico.js"></script>
  <script src="respuestas_pintadas.js"></script>
  
</head>

<body>

  <!-- HEADER FIJO -->
  <header>
      <img src="image_0.png" alt="logo">
      <div id="roleText">usuario</div>
      <button id="shieldBtn">🛡️</button>
      <button id="logoutBtn" style="display:none;">Salir</button>
  </header>

  <!-- MODAL ADMIN -->
  <div id="adminPanel" class="modal">
    <div class="modal-content">
      <h3>Acceso administrador</h3>
      <input id="adminCode" type="password" placeholder="Código" />
      <div class="modal-buttons">
        <button id="adminEnter">Entrar</button>
        <button id="adminCancel">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- CONTENEDOR DINÁMICO -->
  <div id="appRoot"></div>

<script>
(() => {

  /* RESPUESTAS ACTIVAS (por defecto básico) */
  window.RESPUESTAS = window.RESPUESTAS_BASICO;

  /* CARGAR RESPUESTAS GUARDADAS */
  const savedBasico = localStorage.getItem("RESPUESTAS_BASICO");
  if (savedBasico) window.RESPUESTAS_BASICO = JSON.parse(savedBasico);

  const savedPintadas = localStorage.getItem("RESPUESTAS_PINTADAS");
  if (savedPintadas) window.RESPUESTAS_PINTADAS = JSON.parse(savedPintadas);

  /* VARIABLES GLOBALES */
  const $ = sel => document.querySelector(sel);

  const estado = {
    role: "usuario",
    nombre: "",
    selur: "",
    jornada: "",
    tipo: "",
    categoria: "",
    sub: ""
  };

  /* ADMIN */
  const shieldBtn = $("#shieldBtn");
  const adminPanel = $("#adminPanel");
  const adminEnter = $("#adminEnter");
  const adminCancel = $("#adminCancel");
  const adminCode = $("#adminCode");
  const logoutBtn = $("#logoutBtn");
  const roleText = $("#roleText");

  shieldBtn.addEventListener("click", () => adminPanel.style.display = "flex");
  adminCancel.addEventListener("click", () => adminPanel.style.display = "none");

  adminEnter.addEventListener("click", () => {
    if (adminCode.value.trim() === "Selur2212@") {
      estado.role = "admin";
      estado.tipo = "";
      estado.categoria = "";
      estado.sub = "";
      adminPanel.style.display = "none";
      adminCode.value = "";
      setRoleUI();
      renderApp();
    } else alert("Código incorrecto");
  });

  logoutBtn.addEventListener("click", () => {
    estado.role = "usuario";
    estado.tipo = "";
    estado.categoria = "";
    estado.sub = "";
    setRoleUI();
    renderApp();
  });

  function setRoleUI() {
    roleText.textContent = estado.role;
    logoutBtn.style.display = estado.role === "admin" ? "inline-block" : "none";
  }


 function renderApp() {
  const root = $("#appRoot");
  root.innerHTML = "";

  /* FORMULARIO USUARIO (solo para NO admin) */
  if (estado.role !== "admin" && (!estado.selur || !estado.jornada)) {
    root.innerHTML = `
      <h2 style="color:#c40000;">Datos del trabajador</h2>

      <label>¿Eres del Selur básico o pintadas?</label>
      <select id="inpSelur">
        <option value="">Selecciona...</option>
        <option value="basico">Básico</option>
        <option value="pintadas">Pintadas</option>
      </select>

      <label>Jornada</label>
      <select id="inpJornada">
        <option value="">Selecciona...</option>
      </select>

      <button id="btnForm">Entrar</button>
      <!-- 🔥🔥🔥 BOTONES DE DESCARGA DEBAJO DEL FORMULARIO -->
<div style="margin-top:40px; display:flex; flex-direction:column; gap:15px;">

  <a href="docs/convenio_26_31.pdf"
     target="_blank"
     style="
       background:#005bbb;
       color:white;
       padding:12px;
       border-radius:8px;
       text-align:center;
       font-weight:bold;
       text-decoration:none;
       box-shadow:0 3px 8px rgba(0,0,0,0.15);
     ">
    Convenio 2026-2031
  </a>

  <a href="https://drive.google.com/file/d/134xts1p7ha__a5vYiqt9nzcx-aP9WvT5/view?usp=drive_link"
     target="_blank"
     style="
       background:#008f39;
       color:white;
       padding:12px;
       border-radius:8px;
       text-align:center;
       font-weight:bold;
       text-decoration:none;
       box-shadow:0 3px 8px rgba(0,0,0,0.15);
     ">
    Acuerdo del SELUR
  </a>

<a href="docs/acuerdo_selur_2.pdf"
   target="_blank"
   style="
     background:#b30000;
     color:white;
     padding:12px;
     border-radius:8px;
     text-align:center;
     font-weight:bold;
     text-decoration:none;
     box-shadow:0 3px 8px rgba(0,0,0,0.15);
   ">
  Tablas salariales jornada completa
</a>

<a href="docs/tablas_salariales_sdf.pdf"
   target="_blank"
   style="
     background:#7a00cc;
     color:white;
     padding:12px;
     border-radius:8px;
     text-align:center;
     font-weight:bold;
     text-decoration:none;
     box-shadow:0 3px 8px rgba(0,0,0,0.15);
   ">
  Tablas salariales SDF
</a>
</div>
<!-- 🔥🔥🔥 FIN BOTONES -->
    `;

    $("#inpSelur").addEventListener("change", () => {
      const j = $("#inpJornada");
      j.innerHTML = "";

      if ($("#inpSelur").value === "basico") {
        j.innerHTML = `
          <option value="">Selecciona...</option>
          <option value="diario">Diario</option>
        `;
      }

      if ($("#inpSelur").value === "pintadas") {
        j.innerHTML = `
          <option value="">Selecciona...</option>
          <option value="diario">Diario</option>
          <option value="sdf">SDF</option>
        `;
      }
    });

    $("#btnForm").addEventListener("click", () => {
      estado.selur = $("#inpSelur").value;
      estado.jornada = $("#inpJornada").value;

      if (!estado.selur || !estado.jornada) {
        alert("Completa todos los campos");
        return;
      }

      const savedBasico = localStorage.getItem("RESPUESTAS_BASICO");
      if (savedBasico) window.RESPUESTAS_BASICO = JSON.parse(savedBasico);

      const savedPintadas = localStorage.getItem("RESPUESTAS_PINTADAS");
      if (savedPintadas) window.RESPUESTAS_PINTADAS = JSON.parse(savedPintadas);

      if (estado.selur === "basico") window.RESPUESTAS = window.RESPUESTAS_BASICO;
      if (estado.selur === "pintadas") window.RESPUESTAS = window.RESPUESTAS_PINTADAS;

      renderApp();
    });

    return;  // ⬅️ AQUÍ TERMINA EL FORMULARIO DEL TRABAJADOR
  }

  // 🔥 SELECTOR PARA ADMIN (si aún no ha elegido Básico/Pintadas)
  if (estado.role === "admin" && !estado.selur) {
    return renderAdminSelurChoice();
  }

  console.log("ROLE:", estado.role, "CAT:", estado.categoria, "SUB:", estado.sub);

  /* CONTROL FINAL */
  if (!estado.categoria) return renderCategorias();
  if (estado.categoria && !estado.sub) return renderSubcategorias();
  if (estado.categoria && estado.sub) return renderContenido();
}

function renderAdminSelurChoice() {
  const root = $("#appRoot");
  root.innerHTML = `
    <h2 style="color:#c40000;">Editar contenido</h2>

    <button id="btnAdminBasico" class="adminSelurBtn">Básico</button>
    <button id="btnAdminPintadas" class="adminSelurBtn">Pintadas</button>
  `;

  $("#btnAdminBasico").addEventListener("click", () => {
    estado.selur = "basico";
    window.RESPUESTAS = window.RESPUESTAS_BASICO;
    estado.categoria = "";
    estado.sub = "";
    renderApp();
  });

  $("#btnAdminPintadas").addEventListener("click", () => {
    estado.selur = "pintadas";
    window.RESPUESTAS = window.RESPUESTAS_PINTADAS;
    estado.categoria = "";
    estado.sub = "";
    renderApp();
  });
}

  /* CATEGORÍAS */
 function renderCategorias() {
  const root = $("#appRoot");
  root.innerHTML = "";

  const titulo = document.createElement("h2");
  titulo.textContent = "Categorías del Convenio";
  titulo.style.color = "#c40000";
  root.appendChild(titulo);

  // BOTÓN VOLVER AL FORMULARIO
  const btnBackForm = document.createElement("button");
  btnBackForm.textContent = "← Volver";
  btnBackForm.style.marginBottom = "15px";
  btnBackForm.addEventListener("click", () => {
    estado.nombre = "";
    estado.selur = "";
    estado.jornada = "";
    estado.categoria = "";
    estado.sub = "";
    renderApp();
  });
  root.appendChild(btnBackForm);

  const grid = document.createElement("div");
  grid.style.display = "grid";
  grid.style.gridTemplateColumns = "repeat(2, 1fr)";
  grid.style.gap = "12px";
  grid.style.marginTop = "20px";

  Object.keys(window.ESTRUCTURA).forEach(cat => {
    const c = window.ESTRUCTURA[cat];

    const card = document.createElement("div");
    card.style.padding = "20px";
    card.style.background = "#fff";
    card.style.borderRadius = "10px";
    card.style.cursor = "pointer";
    card.style.textAlign = "center";
    card.style.boxShadow = "0 4px 12px rgba(0,0,0,.08)";

    card.innerHTML = `
      <div style="font-size:30px;">${c.icono}</div>
      <div style="margin-top:10px;">${c.titulo}</div>
    `;

    card.addEventListener("click", () => {
      estado.categoria = cat;
      renderSubcategorias();
    });

    grid.appendChild(card);
  });

  root.appendChild(grid);
}


/* SUBCATEGORÍAS */
function renderSubcategorias() {
  const root = $("#appRoot");
  root.innerHTML = "";

  const cat = window.ESTRUCTURA[estado.categoria];

  const titulo = document.createElement("h2");
  titulo.textContent = cat.titulo;
  titulo.style.color = "#c40000";
  root.appendChild(titulo);

  const btnBack = document.createElement("button");
  btnBack.textContent = "← Volver";
  btnBack.style.marginBottom = "15px";
  btnBack.addEventListener("click", () => {
    estado.sub = "";
    estado.categoria = "";
    renderApp();
  });
  root.appendChild(btnBack);

  // GRID DE SUBCATEGORÍAS
  const grid = document.createElement("div");
  grid.style.display = "grid";
  grid.style.gridTemplateColumns = "repeat(2, 1fr)";
  grid.style.gap = "12px";

  Object.keys(cat.sub).forEach(sub => {

    // 🔥 OCULTAR SDF para BÁSICO y para ADMIN
    if ((estado.selur === "basico" || estado.role === "admin") && sub === "sdf") {
      return;
    }

    const s = cat.sub[sub];

    const card = document.createElement("div");
    card.style.padding = "20px";
    card.style.background = "#fff";
    card.style.borderRadius = "10px";
    card.style.cursor = "pointer";
    card.style.textAlign = "center";

    card.textContent = s.titulo;

    card.addEventListener("click", () => {
      estado.sub = sub;
      renderContenido();
    });

    grid.appendChild(card);
  });

  root.appendChild(grid);
}

  /* CONTENIDO */
/* ===========================
      CONTENIDO
=========================== */
function renderContenido() {   // ← INICIO REAL DE LA FUNCIÓN

  const root = $("#appRoot");
  root.innerHTML = "";

  const titulo = document.createElement("h2");
  titulo.textContent = window.ESTRUCTURA[estado.categoria].sub[estado.sub].titulo;
  titulo.style.color = "#c40000";
  root.appendChild(titulo);

  const btnBack = document.createElement("button");
  btnBack.textContent = "← Volver";
  btnBack.style.marginBottom = "15px";
  btnBack.addEventListener("click", () => {
    estado.sub = "";
    renderSubcategorias();
  });
  root.appendChild(btnBack);

  const nodo = window.RESPUESTAS[estado.categoria][estado.sub];

  // Asegurar array de imágenes por subcategoría
  if (!nodo.imagenes) nodo.imagenes = [];

  /* ===========================
        ADMIN (EDITA)
  ============================ */
  if (estado.role === "admin") {

    // --- SUBIR IMÁGENES ---
    const imgTitle = document.createElement("h3");
    imgTitle.textContent = "Imágenes de esta subcategoría";
    imgTitle.style.marginTop = "10px";
    root.appendChild(imgTitle);

    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.multiple = true;
    input.style.marginBottom = "15px";
    root.appendChild(input);

    input.addEventListener("change", e => {
      [...e.target.files].forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          nodo.imagenes.push(ev.target.result);
          renderContenido(); // refrescar
        };
        reader.readAsDataURL(file);
      });
    });

    // --- GRID DE IMÁGENES ---
    const grid = document.createElement("div");
    grid.className = "images-grid";

    nodo.imagenes.forEach((img, i) => {
      const wrap = document.createElement("div");
      wrap.className = "img-wrap";

      const image = document.createElement("img");
      image.src = img;

      const del = document.createElement("button");
      del.className = "img-remove";
      del.textContent = "X";
      del.addEventListener("click", () => {
        nodo.imagenes.splice(i, 1);
        renderContenido();
      });

      wrap.appendChild(image);
      wrap.appendChild(del);
      grid.appendChild(wrap);
    });

    root.appendChild(grid);

    // --- EDITOR DE TEXTO ---
    const cont = document.createElement("div");
    cont.style.marginTop = "20px";

    cont.innerHTML = `
      <label>Texto</label>
      <textarea id="txtGeneral" rows="12">${nodo.texto || ""}</textarea>
      <button id="btnSave" style="margin-top:20px;">Guardar</button>
    `;

    root.appendChild(cont);

    const btnSave = cont.querySelector("#btnSave");
    const txtGeneral = cont.querySelector("#txtGeneral");

    btnSave.addEventListener("click", () => {
      nodo.texto = txtGeneral.value;

      if (estado.tipo === "basico") {
        localStorage.setItem("RESPUESTAS_BASICO", JSON.stringify(window.RESPUESTAS_BASICO));
      }

      if (estado.tipo === "pintadas") {
        localStorage.setItem("RESPUESTAS_PINTADAS", JSON.stringify(window.RESPUESTAS_PINTADAS));
      }

      alert("Guardado");
    });

    return;
  }

  /* ===========================
        USUARIO (VE)
  ============================ */

  // Mostrar imágenes al usuario
  if (nodo.imagenes.length > 0) {
    const grid = document.createElement("div");
    grid.className = "images-grid";

    nodo.imagenes.forEach(img => {
      const wrap = document.createElement("div");
      wrap.className = "img-wrap";

      const image = document.createElement("img");
      image.src = img;

      wrap.appendChild(image);
      grid.appendChild(wrap);
    });

    root.appendChild(grid);
  }

  // Mostrar texto
  const box = document.createElement("div");
  box.style.background = "#fff";
  box.style.padding = "20px";
  box.style.borderRadius = "10px";
  box.style.boxShadow = "0 4px 12px rgba(0,0,0,.08)";
  box.className = "texto-render";
  box.textContent = nodo.texto || "No hay contenido disponible";

  root.appendChild(box);
}   // ← FIN REAL DE LA FUNCIÓN renderContenido()


/* ===========================
      INICIALIZACIÓN
=========================== */

setRoleUI();
renderApp();

})();
</script>

</body>
</html>
