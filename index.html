<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Convenio LPV Madrid 2026–2031</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      .primary-red { color: #c40000; }
      .bg-primary-red { background-color: #c40000; }
      .border-primary-red { border-color: #c40000; }
    </style>
  </head>

  <body class="bg-white">
    <div id="root"></div>

    <!-- ARCHIVOS EXTERNOS -->
    <script src="config.js"></script>
    <script src="estructura.js"></script>
    <script src="respuestas.js"></script>

    <!-- APP -->
    <script type="text/babel">
      const { useState, useEffect } = React;

      /* ============================================================
         CARGAR RESPUESTAS DESDE LOCALSTORAGE SI EXISTEN
      ============================================================ */
      if (localStorage.getItem("RESPUESTAS")) {
        try {
          const guardado = JSON.parse(localStorage.getItem("RESPUESTAS"));
          window.RESPUESTAS = guardado;
        } catch (e) {
          console.error("Error cargando RESPUESTAS guardadas");
        }
      }

      /* ============================================================
         HELPERS FILTRADO
      ============================================================ */

      function esNoAplica(txt) {
        return txt && txt.trim().toLowerCase() === "no aplica";
      }

      function tieneContenido(c, s, ss, jornada) {
        const nodo = ss
          ? window.RESPUESTAS[c]?.[s]?.[ss]
          : window.RESPUESTAS[c]?.[s];

        if (!nodo) return false;

        const t = nodo[jornada];
        if (!t || esNoAplica(t)) return false;

        return true;
      }

     function subVisible(c, s, jornada) {
  return true; // Mostrar SIEMPRE todas las subcarpetas
}
     function subSubVisible(c, s, ss, jornada) {
  return true; // Mostrar SIEMPRE todas las sub-subcarpetas
}

      /* ============================================================
         COMPONENTES BASE
      ============================================================ */

      function Resultado({ categoriaId, subId, subSubId, jornada, onBack }) {
        const texto = subSubId
          ? window.RESPUESTAS[categoriaId][subId][subSubId][jornada]
          : window.RESPUESTAS[categoriaId][subId][jornada];

        return (
          <div className="p-4">
            <button
              onClick={onBack}
              className="text-primary-red font-bold mb-4 hover:underline"
            >
              ← Volver
            </button>

            <div className="bg-white border border-primary-red p-4 rounded-xl shadow">
              <pre className="whitespace-pre-wrap text-sm">{texto}</pre>
            </div>
          </div>
        );
      }

      function SubSubMenu({ categoriaId, subId, jornada, onBack }) {
        const [subSubId, setSubSubId] = useState(null);
        const subNode = window.ESTRUCTURA[categoriaId].sub[subId];

        if (!subNode.sub) {
          return (
            <Resultado
              categoriaId={categoriaId}
              subId={subId}
              subSubId={null}
              jornada={jornada}
              onBack={onBack}
            />
          );
        }

        if (subSubId) {
          return (
            <Resultado
              categoriaId={categoriaId}
              subId={subId}
              subSubId={subSubId}
              jornada={jornada}
              onBack={() => setSubSubId(null)}
            />
          );
        }

        const visibles = Object.keys(subNode.sub).filter((ss) =>
          subSubVisible(categoriaId, subId, ss, jornada)
        );

        return (
          <div className="p-4">
            <button
              onClick={onBack}
              className="text-primary-red font-bold mb-4 hover:underline"
            >
              ← Volver
            </button>

            <div className="grid grid-cols-1 gap-3">
              {visibles.map((ss) => (
                <button
                  key={ss}
                  onClick={() => setSubSubId(ss)}
                  className="bg-red-50 border border-primary-red p-4 rounded-lg shadow text-left font-semibold hover:bg-red-100"
                >
                  {subNode.sub[ss].titulo}
                </button>
              ))}
            </div>
          </div>
        );
      }

      function SubMenu({ categoriaId, jornada, onBack }) {
        const [subId, setSubId] = useState(null);
        const subs = window.ESTRUCTURA[categoriaId].sub;

        if (subId) {
          return (
            <SubSubMenu
              categoriaId={categoriaId}
              subId={subId}
              jornada={jornada}
              onBack={() => setSubId(null)}
            />
          );
        }

        const visibles = Object.keys(subs).filter((s) =>
          subVisible(categoriaId, s, jornada)
        );

        return (
          <div className="p-4">
            <button
              onClick={onBack}
              className="text-primary-red font-bold mb-4 hover:underline"
            >
              ← Volver
            </button>

            <div className="grid grid-cols-1 gap-3">
              {visibles.map((s) => (
                <button
                  key={s}
                  onClick={() => setSubId(s)}
                  className="bg-red-50 border border-primary-red p-4 rounded-lg shadow text-left font-semibold hover:bg-red-100"
                >
                  {subs[s].titulo}
                </button>
              ))}
            </div>
          </div>
        );
      }
/* ============================================================
         CONSULTA MENU (ACTUALIZADO)
      ============================================================ */

      function ConsultaMenu({ jornada, onLogout }) {
        const [categoriaId, setCategoriaId] = useState(null);

        /* Cargar RESPUESTAS guardadas */
        useEffect(() => {
          if (localStorage.getItem("RESPUESTAS")) {
            try {
              const guardado = JSON.parse(localStorage.getItem("RESPUESTAS"));
              window.RESPUESTAS = guardado;
              console.log("RESPUESTAS cargadas desde localStorage");
            } catch (e) {
              console.error("Error cargando RESPUESTAS guardadas");
            }
          }
        }, []);

        const categorias = Object.entries(window.ESTRUCTURA);

        if (categoriaId) {
          return (
            <SubMenu
              categoriaId={categoriaId}
              jornada={jornada}
              onBack={() => setCategoriaId(null)}
            />
          );
        }

        return (
          <div className="p-4">

            <div className="flex justify-end mb-4">
              <button
                onClick={onLogout}
                className="text-xs text-white bg-primary-red px-3 py-1 rounded"
              >
                Desconectar
              </button>
            </div>

            <h1 className="text-center text-2xl font-bold primary-red mb-1">
              {window.CONFIG.textos.tituloMenu}
            </h1>
            <p className="text-center text-sm text-gray-600 mb-6">
              {window.CONFIG.textos.subtituloMenu}
            </p>

            <div className="grid grid-cols-2 gap-4">
              {categorias.map(([id, cat]) => (
                <button
                  key={id}
                  onClick={() => setCategoriaId(id)}
                  className="bg-primary-red text-white p-4 rounded-xl shadow-lg flex items-center space-x-2 hover:opacity-90"
                >
                  <span className="text-xl">
                    {window.CONFIG.iconos[id] || "📁"}
                  </span>
                  <span className="font-bold text-sm">{cat.titulo}</span>
                </button>
              ))}
            </div>
          </div>
        );
      }

      /* ============================================================
         PANEL ADMIN REAL (INICIO)
      ============================================================ */

function AdminEditor({ onLogout }) {
  const [categoria, setCategoria] = useState(null);
  const [sub, setSub] = useState(null);
  const [subsub, setSubsub] = useState(null);
  const [textoDiario, setTextoDiario] = useState("");
  const [textoSdf, setTextoSdf] = useState("");

  useEffect(() => {
    if (!categoria || !sub) return;
    if (!window.RESPUESTAS) window.RESPUESTAS = {};
    if (!window.RESPUESTAS[categoria]) window.RESPUESTAS[categoria] = {};
    if (!window.RESPUESTAS[categoria][sub]) {
      window.RESPUESTAS[categoria][sub] = { diario: "", sdf: "", imagenes: [] };
    }
    if (subsub) {
      if (!window.RESPUESTAS[categoria][sub][subsub]) {
        window.RESPUESTAS[categoria][sub][subsub] = { diario: "", sdf: "", imagenes: [] };
      }
    }
    const nodo = subsub
      ? window.RESPUESTAS[categoria][sub][subsub]
      : window.RESPUESTAS[categoria][sub];
    setTextoDiario(nodo?.diario || "");
    setTextoSdf(nodo?.sdf || "");
  }, [categoria, sub, subsub]);

  const subirImagenes = async (e) => {
    if (!categoria || !sub) {
      alert("Selecciona categoría y subcarpeta antes de subir imágenes.");
      return;
    }
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    const nuevas = [];
    for (const file of files) {
      const maxMB = 6;
      if (file.size > maxMB * 1024 * 1024) {
        alert(`El archivo ${file.name} supera ${maxMB} MB y no se subirá.`);
        continue;
      }
      const reader = new FileReader();
      await new Promise((resolve) => {
        reader.onload = () => {
          nuevas.push(reader.result);
          resolve();
        };
        reader.readAsDataURL(file);
      });
    }
    if (!window.RESPUESTAS) window.RESPUESTAS = {};
    if (!window.RESPUESTAS[categoria]) window.RESPUESTAS[categoria] = {};
    if (!window.RESPUESTAS[categoria][sub]) window.RESPUESTAS[categoria][sub] = { diario: "", sdf: "", imagenes: [] };
    if (subsub && !window.RESPUESTAS[categoria][sub][subsub]) window.RESPUESTAS[categoria][sub][subsub] = { diario: "", sdf: "", imagenes: [] };
    const nodo = subsub
      ? window.RESPUESTAS[categoria][sub][subsub]
      : window.RESPUESTAS[categoria][sub];
    if (!nodo.imagenes) nodo.imagenes = [];
    nodo.imagenes.push(...nuevas);
    localStorage.setItem("RESPUESTAS", JSON.stringify(window.RESPUESTAS));
    alert("Imágenes añadidas");
  };

  const eliminarImagen = (i) => {
    const nodo = subsub
      ? window.RESPUESTAS?.[categoria]?.[sub]?.[subsub]
      : window.RESPUESTAS?.[categoria]?.[sub];
    if (!nodo || !nodo.imagenes || !nodo.imagenes[i]) {
      alert("No se encontró la imagen.");
      return;
    }
    nodo.imagenes.splice(i, 1);
    localStorage.setItem("RESPUESTAS", JSON.stringify(window.RESPUESTAS));
    setTextoDiario((t) => t);
    alert("Imagen eliminada");
  };

  const guardar = () => {
    if (!categoria || !sub) {
      alert("Selecciona categoría y subcarpeta antes de guardar.");
      return;
    }
    if (!window.RESPUESTAS) window.RESPUESTAS = {};
    if (!window.RESPUESTAS[categoria]) window.RESPUESTAS[categoria] = {};
    if (!window.RESPUESTAS[categoria][sub]) window.RESPUESTAS[categoria][sub] = { diario: "", sdf: "", imagenes: [] };
    if (subsub && !window.RESPUESTAS[categoria][sub][subsub]) window.RESPUESTAS[categoria][sub][subsub] = { diario: "", sdf: "", imagenes: [] };
    const nodo = subsub
      ? window.RESPUESTAS[categoria][sub][subsub]
      : window.RESPUESTAS[categoria][sub];
    nodo.diario = textoDiario;
    nodo.sdf = textoSdf;
    alert("Guardado en memoria");
  };

  const guardarTodo = () => {
    if (!window.RESPUESTAS) window.RESPUESTAS = {};
    localStorage.setItem("RESPUESTAS", JSON.stringify(window.RESPUESTAS));
    alert("Guardado en localStorage (persistente)");
  };

  const categorias = window.ESTRUCTURA ? Object.entries(window.ESTRUCTURA) : [];
  const subs = categoria && window.ESTRUCTURA?.[categoria]?.sub ? Object.entries(window.ESTRUCTURA[categoria].sub) : [];
  const subsubs =
    categoria && sub && window.ESTRUCTURA?.[categoria]?.sub?.[sub]?.sub
      ? Object.entries(window.ESTRUCTURA[categoria].sub[sub].sub)
      : [];

  return (
    <div className="p-4">
      <div className="flex justify-between mb-4">
        <h1 className="text-primary-red font-bold text-xl">Panel Admin</h1>
        <button
          onClick={onLogout}
          className="text-xs text-white bg-primary-red px-3 py-1 rounded"
        >
          Salir
        </button>
      </div>

      <select
        className="w-full border border-primary-red p-2 rounded mb-3"
        value={categoria || ""}
        onChange={(e) => {
          setCategoria(e.target.value || null);
          setSub(null);
          setSubsub(null);
        }}
      >
        <option value="">Selecciona categoría</option>
        {categorias.map(([id, cat]) => (
          <option key={id} value={id}>{cat.titulo}</option>
        ))}
      </select>

      {categoria && (
        <select
          className="w-full border border-primary-red p-2 rounded mb-3"
          value={sub || ""}
          onChange={(e) => {
            setSub(e.target.value || null);
            setSubsub(null);
          }}
        >
          <option value="">Selecciona subcarpeta</option>
          {subs.map(([id, nodo]) => (
            <option key={id} value={id}>{nodo.titulo}</option>
          ))}
        </select>
      )}

      {categoria && sub && subsubs.length > 0 && (
        <select
          className="w-full border border-primary-red p-2 rounded mb-3"
          value={subsub || ""}
          onChange={(e) => setSubsub(e.target.value || null)}
        >
          <option value="">(Sin sub-subcarpeta)</option>
          {subsubs.map(([id, nodo]) => (
            <option key={id} value={id}>{nodo.titulo}</option>
          ))}
        </select>
      )}

      {categoria && sub && (
        <div>
          <h2 className="font-bold mb-2">Texto Diario</h2>
          <textarea
            className="w-full border border-primary-red p-2 rounded mb-4 h-32"
            value={textoDiario}
            onChange={(e) => setTextoDiario(e.target.value)}
          />

          <h2 className="font-bold mb-2">Texto SDF</h2>
          <textarea
            className="w-full border border-primary-red p-2 rounded mb-4 h-32"
            value={textoSdf}
            onChange={(e) => setTextoSdf(e.target.value)}
          />

          <h2 className="font-bold text-primary-red mt-4">Imágenes</h2>
          <input
            type="file"
            accept="image/*"
            multiple
            onChange={subirImagenes}
            className="w-full border border-primary-red p-2 rounded"
          />

          {(() => {
            const nodo = subsub
              ? window.RESPUESTAS?.[categoria]?.[sub]?.[subsub]
              : window.RESPUESTAS?.[categoria]?.[sub];

            if (!nodo || !nodo.imagenes || nodo.imagenes.length === 0) return null;

            return (
              <div className="grid grid-cols-2 gap-3 mt-4">
                {nodo.imagenes.map((img, i) => (
                  <div key={i} className="relative">
                    <img
                      src={img}
                      className="w-full rounded border shadow"
                      alt={`img-${i}`}
                    />
                    <button
                      className="absolute top-1 right-1 bg-red-600 text-white text-xs px-2 py-1 rounded"
                      onClick={() => eliminarImagen(i)}
                    >
                      X
                    </button>
                  </div>
                ))}
              </div>
            );
          })()}

          <div className="mt-4">
            <button
              onClick={guardar}
              className="bg-primary-red text-white px-4 py-2 rounded font-bold mr-2"
            >
              Guardar
            </button>

            <button
              onClick={guardarTodo}
              className="bg-green-600 text-white px-4 py-2 rounded font-bold"
            >
              Guardar TODO (persistente)
            </button>
          </div>
        </div>
      )}
    </div>
  );
}
      /* ============================================================
         ACCESO ADMIN
      ============================================================ */

      function AdminAccess({ onAdmin }) {
        const [code, setCode] = useState("");

        const check = () => {
          if (code === "Selur2212@") onAdmin();
          else alert("Código incorrecto");
        };

        return (
          <div className="flex items-center space-x-1">
            <input
              className="border border-primary-red p-1 rounded text-xs w-24"
              placeholder="Código"
              value={code}
              onChange={(e) => setCode(e.target.value)}
            />
            <button
              onClick={check}
              className="bg-primary-red text-white px-2 py-1 rounded text-xs"
            >
              🛡️
            </button>
          </div>
        );
      }

      /* ============================================================
         LOGIN
      ============================================================ */

      function Login({ onLogin }) {
        const [nombre, setNombre] = useState("");
        const [empresa, setEmpresa] = useState("");
        const [turno, setTurno] = useState("");
        const [jornada, setJornada] = useState("");

        const handleSubmit = () => {
          if (!nombre || !empresa || !turno || !jornada) {
            alert("Completa todos los campos");
            return;
          }
          onLogin({ nombre, empresa, turno, jornada });
        };

        return (
          <div className="max-w-md mx-auto mt-10 p-6 border border-primary-red rounded-xl bg-white shadow">
            <h1 className="text-xl font-bold text-primary-red mb-4">
              {window.CONFIG.textos.saludoLogin}
            </h1>

            <div className="space-y-3">
              <input
                className="w-full border border-primary-red p-2 rounded"
                placeholder="Nombre"
                value={nombre}
                onChange={(e) => setNombre(e.target.value)}
              />

              <select
                className="w-full border border-primary-red p-2 rounded"
                value={empresa}
                onChange={(e) => setEmpresa(e.target.value)}
              >
                <option value="">Empresa</option>
                <option>Prezero</option>
                <option>Urbaser</option>
                <option>Valoriza</option>
                <option>FCC</option>
              </select>

              <select
                className="w-full border border-primary-red p-2 rounded"
                value={turno}
                onChange={(e) => setTurno(e.target.value)}
              >
                <option value="">Turno</option>
                <option>Mañana</option>
                <option>Tarde</option>
                <option>Noche</option>
              </select>

              <select
                className="w-full border border-primary-red p-2 rounded"
                value={jornada}
                onChange={(e) => setJornada(e.target.value)}
              >
                <option value="">Jornada</option>
                <option value="diario">Diario</option>
                <option value="sdf">SDF</option>
              </select>

              <button
                onClick={handleSubmit}
                className="w-full bg-primary-red text-white p-2 rounded font-bold"
              >
                Entrar
              </button>
            </div>
          </div>
        );
      }
/* ============================================================
         APP PRINCIPAL
      ============================================================ */

      function App() {
        const [user, setUser] = useState(null);
        const [admin, setAdmin] = useState(false);

        return (
          <div>
            <header className="border-b border-primary-red bg-white px-1 py-2">
              <div className="max-w-xl mx-auto flex items-center justify-center space-x-3">
                <div className="flex items-center space-x-2">
                  <img src="image_0.png" className="h-8 w-auto" />
                  <span className="font-bold text-primary-red text-base whitespace-nowrap">
                    {window.CONFIG.appName}
                  </span>
                </div>

                {!user && !admin && (
                  <AdminAccess onAdmin={() => setAdmin(true)} />
                )}
              </div>
            </header>

            <main className="p-4 max-w-xl mx-auto">
              {!user && !admin && <Login onLogin={setUser} />}

              {user && !admin && (
                <ConsultaMenu
                  jornada={user.jornada}
                  onLogout={() => setUser(null)}
                />
              )}

              {admin && <AdminEditor onLogout={() => setAdmin(false)} />}
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
